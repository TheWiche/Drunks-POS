<style>
  /* ── Base ── */
  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  body{background:#020617;color:#f8fafc;font-family:'Segoe UI',system-ui,sans-serif;overscroll-behavior:none}
  ::-webkit-scrollbar{display:none}
  input::placeholder{color:#334155}
  input:focus{outline:none}

  /* ── Interactive: Emil Kowalski press ── */
  .card-tap{
    transition:transform 100ms ease-out,box-shadow 150ms var(--ease-out-quint);
    cursor:pointer;
  }
  .card-tap:active{transform:scale(.94)}

  /* ── Animations ── */
  @keyframes badgePop{
    0%{transform:scale(0) rotate(-15deg)}
    55%{transform:scale(1.25) rotate(3deg)}
    80%{transform:scale(.92) rotate(-1deg)}
    100%{transform:scale(1) rotate(0)}
  }
  .badge-pop{animation:badgePop .3s var(--spring) forwards}

  @keyframes slideUp{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .slide-up{animation:slideUp .22s var(--ease-out-quint) both}

  @keyframes cartItemIn{
    from{opacity:0;transform:translateX(16px)}
    to{opacity:1;transform:translateX(0)}
  }
  .cart-item-in{animation:cartItemIn .22s var(--ease-out-quint) both}

  @keyframes sheetIn{
    from{transform:translateY(100%)}
    to{transform:translateY(0)}
  }
  .sheet-in{animation:sheetIn .32s var(--ease-out-quint)}

  @keyframes modalIn{
    from{opacity:0;transform:scale(.93) translateY(20px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .modal-in{animation:modalIn .28s var(--ease-out-quint)}

  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-7px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(4px)}
  }
  .shake{animation:shake .35s ease}

  @keyframes totalBump{
    0%{transform:scale(1)}
    35%{transform:scale(1.18)}
    65%{transform:scale(.95)}
    100%{transform:scale(1)}
  }
  .total-bump{animation:totalBump .28s var(--spring)}

  /* ── Category pill ── */
  .cat-pill{transition:all .15s var(--ease-out-quint)}
  .cat-pill:active{transform:scale(.93)}

  /* ── Glow utilities ── */
  .glow-purple{box-shadow:0 0 20px rgba(147,51,234,.35)}
  .glow-emerald{box-shadow:0 0 20px rgba(16,185,129,.35)}

  /* ── Agotado ribbon ── */
  .ribbon-sold{position:relative;overflow:hidden}
  .ribbon-sold::before{
    content:'AGOTADO';
    position:absolute;top:12px;left:-24px;
    background:rgba(220,38,38,.9);
    color:#fff;font-size:8px;font-weight:900;letter-spacing:.16em;
    padding:2px 38px;
    transform:rotate(-45deg);
    pointer-events:none;z-index:10;
  }

  /* ── Reduced motion ── */
  @media(prefers-reduced-motion:reduce){
    .card-tap,.cat-pill{transition:opacity 150ms linear!important;transform:none!important}
    .badge-pop,.slide-up,.cart-item-in,.sheet-in,.modal-in,.shake,.total-bump{animation:none!important}
  }
</style>
</head>

      <button data-theme="gold"    onclick="applyTheme('gold')"    class="theme-opt w-full flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors cursor-pointer"><span class="w-5 h-5 rounded-full shrink-0" style="background:#ca8a04"></span><span class="text-white text-sm font-semibold">Dorado</span></button>
    </div>
    <div class="mt-3 pt-3 border-t border-white/6">
      <div class="text-gray-600 text-[10px] font-bold mb-2">COLOR PERSONALIZADO</div>
      <div class="flex items-center gap-2">
        <input type="color" id="customColorPicker" value="#9333ea"
          oninput="applyCustomTheme(this.value)"
          style="display:none;width:2rem;height:2rem;border-radius:.5rem;border:none;cursor:pointer;background:transparent;padding:0">
        <button onclick="document.getElementById('customColorPicker').style.display='inline-block';document.getElementById('customColorPicker').click()"
          class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs text-gray-400 transition-colors hover:bg-white/5 border border-white/8 cursor-pointer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
          Elegir color
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SELECTOR DE BASE (bottom sheet) ═══ -->
<div id="baseSheet" class="fixed inset-0 z-50 hidden items-end">
  <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeBase()"></div>
  <div class="sheet-in relative w-full rounded-t-3xl shadow-2xl overflow-hidden"
       style="background:rgba(6,10,30,.97);backdrop-filter:blur(32px);border-top:1px solid rgba(255,255,255,.07)">
    <div class="flex justify-center pt-3 pb-1">
      <div class="w-10 h-1 rounded-full" style="background:rgba(255,255,255,.12)"></div>
    </div>
    <div class="px-5 pb-8">
      <div id="baseProdName" class="text-2xl font-extrabold text-center text-white mt-2 leading-tight"></div>
      <div class="text-purple-500 text-[9px] text-center tracking-[.28em] mt-1 mb-5 font-black">SELECCIONA LA BASE</div>
      <div id="baseTypeSections"></div>
      <button onclick="closeBase()" class="mt-5 w-full text-gray-500 font-semibold py-3 rounded-2xl text-sm transition-colors hover:text-gray-300 cursor-pointer"
        style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)">
        Cancelar
      </button>
    </div>
  </div>
</div>

<!-- ═══ MODAL CONFIRMACIÓN ═══ -->
<div id="confirmModal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center p-3"
     style="background:rgba(0,0,0,.88);backdrop-filter:blur(12px)">
  <div class="modal-in rounded-3xl w-full max-w-md shadow-2xl overflow-hidden"
       style="background:#0a0f2a;border:1px solid rgba(255,255,255,.07)">
    <!-- Header -->
    <div class="relative px-6 py-5 text-center"
         style="background:linear-gradient(160deg,rgba(88,28,135,.6),rgba(67,56,202,.5))">
      <div class="absolute inset-0" style="background:radial-gradient(ellipse at 50% -10%,rgba(124,58,237,.4),transparent 65%)"></div>
      <div class="relative">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="mx-auto mb-2 text-purple-300"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <h2 class="text-lg font-extrabold tracking-wide text-white">Resumen del Pedido</h2>
        <p class="text-purple-300/60 text-xs mt-0.5 tracking-wider">Revisa antes de mandar a cocina</p>
      </div>
    </div>
    <!-- Items -->
    <div class="px-5 py-4 max-h-64 overflow-y-auto space-y-2.5">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-gray-500 text-[9px] tracking-[.2em] font-bold">CLIENTE</div>
          <div id="smCliente" class="text-white font-extrabold text-2xl leading-tight"></div>
        </div>
        <div id="smMetodo" class="px-3 py-1.5 rounded-full text-sm font-bold shrink-0 mt-1 border"></div>
      </div>
      <div class="border-t pt-2" style="border-color:rgba(255,255,255,.06)">
        <div id="smItems" class="space-y-2"></div>
      </div>
      <div class="border-t pt-3 flex justify-between items-center" style="border-color:rgba(255,255,255,.08)">
        <span class="text-gray-500 font-semibold text-sm tracking-wider">TOTAL</span>
        <span id="smTotal" class="text-white font-extrabold text-2xl tabular-nums"></span>
      </div>
    </div>
    <!-- Actions -->
    <div class="px-5 pb-5 pt-1 space-y-2">
      <button id="confirmBtn" onclick="sendOrder()"
        class="card-tap w-full text-white font-extrabold py-4 rounded-2xl text-base transition-all cursor-pointer"
        style="background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.45);box-shadow:0 0 22px rgba(34,197,94,.18)">
        ✓ Confirmar y Mandar a Preparación
      </button>
      <button onclick="closeConfirm()"
        class="w-full text-gray-500 font-semibold py-3 rounded-2xl text-sm transition-colors hover:text-gray-300 cursor-pointer"
        style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)">
        Cancelar — Seguir Editando
      </button>
    </div>
  </div>
</div>

<script>
// ── Colores dinámicos por categoría ──
function hexToRgb(hex) {
  const h = (hex || '#8b5cf6').replace('#','');
  const n = parseInt(h.length === 3 ? h.split('').map(x=>x+x).join('') : h, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function catStyle(cat, active) {
  const [r,g,b] = hexToRgb(cat?.color);
  if (active) return `background:rgba(${r},${g},${b},0.52);border-color:rgba(${r},${g},${b},0.85);box-shadow:0 0 22px rgba(${r},${g},${b},0.4)`;
  return `background:rgba(${r},${g},${b},0.14);border-color:rgba(${r},${g},${b},0.22)`;
}
function catPillStyle(cat, active) {
  const [r,g,b] = hexToRgb(cat?.color);
  if (active) return `background:rgba(${r},${g},${b},0.88);color:#fff;box-shadow:0 0 14px rgba(${r},${g},${b},0.45)`;
  return '';
}

let availBases = [];
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Estado ──
let products = [], categories = [], quickNotes = [];
let cart = {};
let lastKey  = null;
let activeCat = null;
let pendingProd = null;
let pendingMethod = null;

// ── Init ──
async function init() {
  await Promise.all([loadCats(), loadProducts(), loadNotes()]);
}

async function loadCats() {
  try { const r = await fetch('/api/categorias'); categories = await r.json(); }
  catch(e) { categories = []; }
  renderCats();
}

async function loadProducts() {
  try { const r = await fetch('/api/productos'); products = await r.json(); }
  catch(e) { products = []; }
  renderProds();
}

async function loadNotes() {
  try { const r = await fetch('/api/notas_rapidas'); quickNotes = await r.json(); }
  catch(e) { quickNotes = []; }
  renderNotes();
}

// ── Categorías ──
function catById(id) { return categories.find(c => c.id === id) || null; }

function renderCats() {
  const bar = document.getElementById('catBar');
  const all = `<button onclick="selectCat(null)"
    class="cat-pill shrink-0 px-4 py-1.5 rounded-full text-xs font-bold transition-all border cursor-pointer
      ${activeCat === null
        ? 'bg-purple-600 text-white border-purple-500/60 glow-purple'
        : 'text-gray-500 border-white/8 hover:border-white/15 hover:text-gray-300'}"
    style="${activeCat === null ? '' : 'background:rgba(255,255,255,.04)'}">
    Todas
  </button>`;
  bar.innerHTML = all + categories.map(c => {
    const isActive = activeCat === c.id;
    const pillSt = catPillStyle(c, isActive);
    return `<button onclick="selectCat(${c.id})"
      class="cat-pill shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-bold transition-all border cursor-pointer
        ${isActive ? 'text-white' : 'text-gray-500 hover:text-gray-300'}"
      style="${isActive ? pillSt : 'background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);' + pillSt}">
      <span>${c.icono || '🏷️'}</span>${c.nombre}
    </button>`;
  }).join('');
}

function selectCat(id) {
  activeCat = id;
  renderCats();
  renderProds();
}

// ── Productos ──
function totalQtyForProd(id) {
  return Object.entries(cart)
    .filter(([k]) => k.startsWith(id + '|'))
    .reduce((s, [, v]) => s + v.qty, 0);
}
function isActiveProd(id) {
  return lastKey && lastKey.startsWith(id + '|');
}

function _buildProdCardHTML(p) {
  const qty    = totalQtyForProd(p.id);
  const avail  = !!p.disponible;
  const cat    = catById(p.categoria_id);
  const active = isActiveProd(p.id);
  const isMich = !!p.tiene_base;
  const icon   = cat?.icono || '🍾';
  const [r,g,b] = hexToRgb(cat?.color);
  const cardSt = avail ? catStyle(cat, active) : '';

  return `<div id="prod-card-${p.id}"
      class="card-tap relative rounded-2xl select-none border overflow-hidden flex flex-col items-center justify-center min-h-[8rem] text-center px-2 py-3.5
        ${avail
          ? 'transition-all duration-100'
          : 'grayscale opacity-25 cursor-not-allowed border-white/5 ribbon-sold'}"
      style="${cardSt}"
      ${avail ? 'onclick="tapProd(' + p.id + ')"' : ''}>
    ${qty > 0
      ? `<div class="badge-pop absolute -top-1.5 -right-1.5 z-10 bg-purple-500 text-white text-[11px] font-extrabold w-6 h-6 rounded-full flex items-center justify-center ring-2 ring-[#020617]">${qty}</div>`
      : ''}
    ${isMich
      ? `<div class="absolute top-2 left-2 text-[7.5px] text-amber-300 font-black tracking-wider px-1.5 py-0.5 rounded-full border border-amber-500/30" style="background:rgba(120,83,0,.45)">BASE</div>`
      : ''}
    <!-- Left color strip -->
    <div class="absolute left-0 top-0 bottom-0 w-1 rounded-l-2xl" style="background:rgba(${r},${g},${b},.7)"></div>
    <div class="text-3xl mb-1.5">${icon}</div>
    <div class="text-white font-bold text-[13px] leading-tight px-1 line-clamp-2">${p.nombre}</div>
    <div class="font-semibold text-xs mt-2 tabular-nums ${active ? 'text-purple-300' : 'text-gray-500'}">$${Math.round(p.precio).toLocaleString('es-CO')}</div>
  </div>`;
}

function _refreshProdCard(prodId) {
  const p  = products.find(x => x.id === prodId);
  const el = document.getElementById('prod-card-' + prodId);
  if (!p || !el) { renderProds(); return; }
  el.outerHTML = _buildProdCardHTML(p);
}

function renderProds() {
  const grid = document.getElementById('prodsGrid');
  const list = activeCat !== null ? products.filter(p => p.categoria_id === activeCat) : products;
  if (!list.length) {
    grid.innerHTML = '<div class="col-span-2 text-gray-700 text-center text-sm py-10">Sin productos en esta categoría</div>';
    return;
  }
  grid.innerHTML = list.map(_buildProdCardHTML).join('');
}

function tapProd(id) {
  const p = products.find(x => x.id === id);
  if (!p || !p.disponible) return;
  if (p.tiene_base) {
    openBase(p);
  } else {
    const key = id + '|';
    lastKey = key;
    if (!cart[key]) { cart[key] = { product: p, qty: 1, base: '', obs: '' }; }
    else { cart[key].qty++; }
    _refreshProdCard(id); renderCart(); renderNotes(); updateTotal();
  }
}

// ── Selector de Base ──
async function openBase(product) {
  pendingProd = product;
  document.getElementById('baseProdName').textContent = product.nombre;
  const container = document.getElementById('baseTypeSections');
  container.innerHTML = '<div class="text-gray-600 text-xs text-center py-4">Cargando...</div>';
  const s = document.getElementById('baseSheet');
  s.classList.remove('hidden'); s.classList.add('flex');
  try {
    const r = await fetch('/api/productos/'+product.id+'/bases');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    availBases = Array.isArray(data) ? data : [];
  } catch(e) { availBases = []; }
  try {
    renderBaseSheet();
  } catch(e) {
    container.innerHTML = '<div class="text-red-400 text-xs text-center py-4">Error al cargar bases.</div>';
  }
}

function renderBaseSheet() {
  const byTipo = {};
  availBases.filter(b => b.disponible).forEach(b => {
    const key = b.tipo_nombre || b.tipo || 'Otros';
    if (!byTipo[key]) byTipo[key] = { icono: b.tipo_icono || '🍹', items: [] };
    byTipo[key].items.push(b);
  });

  const container = document.getElementById('baseTypeSections');
  if (!Object.keys(byTipo).length) {
    container.innerHTML = '<div class="text-gray-600 text-xs text-center py-4">Sin bases disponibles</div>';
    return;
  }

  container.innerHTML = Object.entries(byTipo).map(([tipoNombre, { icono, items }]) => `
    <div class="mb-5">
      <div class="flex items-center gap-2 text-gray-500 text-[9px] tracking-[.2em] font-black mb-2.5">
        <span class="text-lg">${icono}</span> ${tipoNombre.toUpperCase()}
      </div>
      <div class="grid grid-cols-${Math.min(items.length,3)} gap-2">
        ${items.map(b => `
          <button data-base="${b.tipo_nombre||b.tipo}: ${b.nombre}" onclick="selectBase(this.dataset.base)"
            class="card-tap border rounded-2xl py-4 text-white font-bold text-sm transition-all leading-tight cursor-pointer"
            style="background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)">
            ${icono}<br>${esc(b.nombre)}
          </button>`).join('')}
      </div>
    </div>`).join('');
}

function closeBase() {
  const s = document.getElementById('baseSheet');
  s.classList.add('hidden'); s.classList.remove('flex');
  pendingProd = null;
}

function selectBase(base) {
  if (!pendingProd) return;
  const key = pendingProd.id + '|' + base;
  const prodId = pendingProd.id;
  lastKey = key;
  if (!cart[key]) { cart[key] = { product: pendingProd, qty: 1, base, obs: '' }; }
  else { cart[key].qty++; }
  closeBase();
  _refreshProdCard(prodId); renderCart(); renderNotes(); updateTotal();
}

// ── Carrito ──
function renderCart() {
  const el    = document.getElementById('cartList');
  const items = Object.entries(cart);
  const btn   = document.getElementById('clearCartBtn');
  if (!items.length) {
    el.innerHTML = `<div class="text-slate-700 text-center text-sm py-8 border border-dashed rounded-2xl" style="border-color:rgba(255,255,255,.06)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="mx-auto mb-2 text-slate-800"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.46 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
      Toca un producto para agregarlo
    </div>`;
    btn.classList.add('hidden');
    return;
  }
  btn.classList.remove('hidden');
  el.innerHTML = items.map(([key, item], idx) => {
    const isActive = key === lastKey;
    return `<div
        class="cart-item-in flex items-start gap-2.5 rounded-2xl px-3 py-2.5 mb-1.5 border cursor-pointer transition-all duration-150"
        style="animation-delay:${idx*30}ms;${isActive
          ? 'background:rgba(88,28,135,.2);border-color:rgba(124,58,237,.4);box-shadow:0 0 12px rgba(124,58,237,.1)'
          : 'background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)'}"
        onclick="selectCartItem('${key.replace(/'/g,"\'")}')">
      <div class="flex-1 min-w-0">
        <div class="text-white text-sm font-bold truncate">${item.product.nombre}</div>
        ${item.base ? `<div class="text-amber-400 text-xs font-semibold mt-0.5">📌 ${item.base}</div>` : ''}
        ${item.obs  ? `<div class="text-yellow-300/60 text-xs mt-0.5">📝 ${item.obs}</div>` : ''}
      </div>
      <div class="flex items-center gap-2 shrink-0 mt-0.5">
        <div class="flex items-center rounded-full gap-0.5 border" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);padding:2px">
          <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();decreaseItem(this.dataset.key)"
            class="w-7 h-7 rounded-full text-white text-base font-bold flex items-center justify-center transition-colors hover:bg-white/10 active:scale-90 cursor-pointer">−</button>
          <span class="text-white font-extrabold text-sm w-5 text-center tabular-nums">${item.qty}</span>
          <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();increaseItem(this.dataset.key)"
            class="w-7 h-7 rounded-full text-white text-base font-bold flex items-center justify-center transition-colors hover:bg-white/10 active:scale-90 cursor-pointer">+</button>
        </div>
        <div class="text-emerald-400 text-sm font-bold tabular-nums w-16 text-right">$${Math.round(item.product.precio * item.qty).toLocaleString('es-CO')}</div>
        <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();removeItem(this.dataset.key)"
          class="text-gray-700 hover:text-red-400 text-lg leading-none ml-0.5 transition-colors w-6 h-6 flex items-center justify-center cursor-pointer">✕</button>
      </div>
    </div>`;
  }).join('');
}

function selectCartItem(key) {
  lastKey = key;
  renderCart();
  renderNotes();
}

function increaseItem(key) {
  if (cart[key]) { cart[key].qty++; renderCart(); updateTotal(); }
}

function decreaseItem(key) {
  if (!cart[key]) return;
  cart[key].qty--;
  if (cart[key].qty <= 0) { delete cart[key]; if (lastKey === key) lastKey = null; }
  _refreshProdCard(parseInt(key.split('|')[0])); renderCart(); renderNotes(); updateTotal();
}

function removeItem(key) {
  const prodId = parseInt(key.split('|')[0]);
  delete cart[key];
  if (lastKey === key) lastKey = null;
  _refreshProdCard(prodId); renderCart(); renderNotes(); updateTotal();
}

async function clearCart() {
  if (!await appConfirm('Limpiar todo el carrito?', 'Limpiar')) return;
  cart = {}; lastKey = null;
  renderProds(); renderCart(); renderNotes(); updateTotal();
}

function updateTotal() {
  const t = Object.values(cart).reduce((s, i) => s + i.product.precio * i.qty, 0);
  const el = document.getElementById('totalDisplay');
  el.textContent = '$' + Math.round(t).toLocaleString('es-CO');
  el.classList.remove('total-bump');
  void el.offsetWidth;
  el.classList.add('total-bump');
}

// ── Notas ──
function renderNotes() {
  const lbl  = document.getElementById('notesLabel');
  const bar  = document.getElementById('notesBar');
  let active = lastKey ? cart[lastKey] : null;

  if (active) {
    const prod = active.product;
    lbl.innerHTML = `NOTAS PARA: <span class="text-purple-400">${prod.nombre}${active.base ? ' · ' + active.base : ''}</span>`;
  } else {
    lbl.textContent = 'NOTAS RÁPIDAS';
  }

  const catId = active ? active.product.categoria_id : null;
  const shown = quickNotes.filter(n => n.categoria_id === null || n.categoria_id === catId);

  if (!shown.length) {
    bar.innerHTML = '<span class="text-gray-700 text-xs">Sin notas configuradas para esta sección.</span>';
    return;
  }

  const appliedNotes = (active && active.obs)
    ? active.obs.split(', ').map(x => x.trim()).filter(Boolean)
    : [];

  bar.innerHTML = shown.map(n => {
    const isCtx     = n.categoria_id !== null;
    const isApplied = appliedNotes.includes(n.texto);
    let cls, st;
    if (isApplied) {
      cls = 'border-purple-500/60 text-white';
      st = 'background:rgba(88,28,135,.55);box-shadow:0 0 10px rgba(168,85,247,.25)';
    } else if (isCtx) {
      cls = 'border-amber-700/40 text-amber-300 hover:bg-amber-900/20';
      st = 'background:rgba(120,53,15,.25)';
    } else {
      cls = 'border-white/8 text-gray-400 hover:border-white/15 hover:text-gray-300';
      st = 'background:rgba(255,255,255,.04)';
    }
    return `<button data-note="${n.texto.replace(/"/g,'&quot;')}" onclick="applyNote(this.dataset.note)"
      class="card-tap text-xs px-3 py-1.5 rounded-full border font-semibold transition-all cursor-pointer ${cls}"
      style="${st}">
      ${isApplied ? '✓ ' : ''}${n.texto}
    </button>`;
  }).join('');
}

function applyNote(note) {
  if (!lastKey || !cart[lastKey]) { showToast('Toca una bebida del carrito primero', 'warn'); return; }
  const item  = cart[lastKey];
  const notes = item.obs ? item.obs.split(', ').map(n => n.trim()).filter(Boolean) : [];
  if (notes.includes(note)) {
    item.obs = notes.filter(n => n !== note).join(', ');
    renderCart(); renderNotes();
    showToast('Nota eliminada', 'warn');
  } else {
    item.obs = notes.length ? notes.join(', ') + ', ' + note : note;
    renderCart(); renderNotes();
    showToast(note, 'ok');
  }
}

function applyFreeNote() {
  const inp  = document.getElementById('freeNote');
  const note = inp.value.trim();
  if (!note) return;
  if (!lastKey || !cart[lastKey]) { showToast('Toca una bebida del carrito primero', 'warn'); return; }
  const item = cart[lastKey];
  item.obs = item.obs ? item.obs + ', ' + note : note;
  inp.value = '';
  renderCart();
  showToast('Nota agregada', 'ok');
}

// ── Flujo pedido ──
function openConfirm(method) {
  const nombre = document.getElementById('clientName').value.trim();
  const inp    = document.getElementById('clientName');
  if (!nombre) {
    inp.classList.add('shake');
    inp.style.borderColor = 'rgba(239,68,68,.6)';
    inp.focus();
    setTimeout(() => { inp.classList.remove('shake'); inp.style.borderColor = ''; }, 800);
    showToast('Escribe el nombre del cliente', 'error');
    return;
  }
  if (!Object.keys(cart).length) { showToast('El carrito está vacío', 'error'); return; }

  pendingMethod = method;
  const items   = Object.values(cart);
  const total   = items.reduce((s, i) => s + i.product.precio * i.qty, 0);

  document.getElementById('smCliente').textContent = nombre;
  const mb = document.getElementById('smMetodo');
  mb.textContent = (method === 'Efectivo' ? '💵 ' : '📱 ') + method;
  mb.className   = 'px-3 py-1.5 rounded-full text-sm font-bold shrink-0 mt-1 border ' +
    (method === 'Efectivo'
      ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/40'
      : 'bg-blue-500/20 text-blue-400 border-blue-500/40');

  document.getElementById('smItems').innerHTML = items.map(i => `
    <div class="flex items-start gap-2 rounded-xl px-3 py-2 border" style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)">
      <span class="bg-purple-700/80 text-white text-xs font-extrabold px-2 py-0.5 rounded-md shrink-0">${i.qty}x</span>
      <div class="flex-1 min-w-0">
        <div class="text-white text-sm font-bold">${i.product.nombre}</div>
        ${i.base ? '<div class="text-amber-400 text-xs font-semibold">📌 ' + i.base + '</div>' : ''}
        ${i.obs  ? '<div class="text-yellow-300/60 text-xs">📝 ' + i.obs + '</div>' : ''}
      </div>
      <div class="text-emerald-400 text-sm font-bold tabular-nums shrink-0">$${Math.round(i.product.precio * i.qty).toLocaleString('es-CO')}</div>
    </div>`).join('');

  document.getElementById('smTotal').textContent = '$' + Math.round(total).toLocaleString('es-CO');
  const m = document.getElementById('confirmModal');
  m.classList.remove('hidden'); m.classList.add('flex');
}

function closeConfirm() {
  const m = document.getElementById('confirmModal');
  m.classList.add('hidden'); m.classList.remove('flex');
  pendingMethod = null;
}

async function sendOrder() {
  const btn     = document.getElementById('confirmBtn');
  const cliente = document.getElementById('clientName').value.trim();
  const items   = Object.values(cart);
  const total   = items.reduce((s, i) => s + i.product.precio * i.qty, 0);
  const method  = pendingMethod;

  btn.disabled = true; btn.textContent = 'Enviando...';

  const cartSnapshot = { ...cart };
  cart = {}; lastKey = null;
  document.getElementById('clientName').value = '';
  renderProds(); renderCart(); renderNotes(); updateTotal();
  closeConfirm();
  showToast('Pedido enviado a cocina!', 'ok');

  try {
    const r = await fetch('/api/pedidos', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cliente, metodo_pago: method, total,
        items: items.map(i => ({
          producto_id:   i.product.id,
          cantidad:      i.qty,
          observaciones: [i.base, i.obs].filter(Boolean).join(' | '),
        })),
      }),
    });
    if (!r.ok) {
      cart = cartSnapshot;
      renderProds(); renderCart(); renderNotes(); updateTotal();
      showToast('Error al enviar — carrito restaurado', 'error');
    }
  } catch(e) {
    cart = cartSnapshot;
    renderProds(); renderCart(); renderNotes(); updateTotal();
    showToast('Sin conexión — carrito restaurado', 'error');
  }
  btn.disabled = false; btn.textContent = '✓ Confirmar y Mandar a Preparación';
}

function showToast(msg, type) {
  const colors = {
    ok:    {border:'rgba(34,197,94,.4)',  text:'#86efac', bg:'rgba(5,46,22,.95)'},
    error: {border:'rgba(239,68,68,.4)',  text:'#fca5a5', bg:'rgba(69,10,10,.95)'},
    warn:  {border:'rgba(234,179,8,.35)', text:'#fde047', bg:'rgba(66,32,6,.95)'},
  };
  const c = colors[type] || colors.ok;
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;top:5rem;left:50%;transform:translateX(-50%) translateY(-6px);opacity:0;
    background:${c.bg};border:1px solid ${c.border};color:${c.text};
    font-size:.8rem;font-weight:700;padding:.5rem 1.2rem;border-radius:1rem;
    z-index:200;pointer-events:none;white-space:nowrap;
    backdrop-filter:blur(16px);transition:transform .22s cubic-bezier(.23,1,.32,1),opacity .22s ease-out;`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => {
    t.style.transform = 'translateX(-50%) translateY(0)';
    t.style.opacity   = '1';
  });
  setTimeout(() => {
    t.style.transform = 'translateX(-50%) translateY(-8px)';
    t.style.opacity   = '0';
    setTimeout(() => t.remove(), 250);
  }, 2200);
}

window.addEventListener('focus', loadNotes);
window.addEventListener('focus', loadProducts);

// ── Settings persistidos en DB ──
function saveSetting(key, value) {
  localStorage.setItem(key, value);
  fetch('/api/settings/'+key, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  }).catch(()=>{});
}
async function loadSettings() {
  try {
    const s = await fetch('/api/settings').then(r=>r.json());
    const pal = s.palette || localStorage.getItem('drunksPalette') || 'dark';
    applyTheme(pal);
    Object.entries(s).forEach(([k,v]) => localStorage.setItem(k, v));
  } catch(e) {
    applyTheme(localStorage.getItem('drunksPalette') || 'dark');
  }
}

// ── Theme System ──
function applyTheme(t) {
  const theme = t||'dark';
  if (theme.startsWith('custom:')) {
    applyCustomTheme(theme.split(':')[1]); return;
  }
  document.documentElement.setAttribute('data-theme', theme);
  saveSetting('drunksPalette', theme);
  saveSetting('palette', theme);
  document.querySelectorAll('.theme-opt[data-theme]').forEach(b => {
    const on = b.dataset.theme === theme;
    b.style.background = on ? 'rgba(147,51,234,.2)' : '';
    b.style.outline    = on ? '1px solid rgba(147,51,234,.5)' : '';
  });
  const picker = document.getElementById('customColorPicker');
  if (picker) picker.style.display = 'none';
}
function applyCustomTheme(hex) {
  let style = document.getElementById('custom-theme-style');
  if (!style) { style = document.createElement('style'); style.id='custom-theme-style'; document.head.appendChild(style); }
  const h = hex||'#9333ea';
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  style.textContent = `
    html[data-theme="custom"] body{background:#06060f}
    html[data-theme="custom"] .bg-purple-600,.bg-purple-700{background-color:${h}!important}
    html[data-theme="custom"] .text-purple-400,.text-purple-300{color:${h}!important}
    html[data-theme="custom"] .border-purple-500{border-color:${h}!important}
    html[data-theme="custom"] .from-purple-600{--tw-gradient-from:${h}!important}
    html[data-theme="custom"] .glow{filter:drop-shadow(0 0 8px rgba(${r},${g},${b},.5))}`;
  document.documentElement.setAttribute('data-theme','custom');
  saveSetting('drunksPalette', 'custom:'+h);
  saveSetting('palette', 'custom:'+h);
  document.querySelectorAll('.theme-opt[data-theme]').forEach(b => {
    b.style.background=''; b.style.outline='';
  });
  const picker = document.getElementById('customColorPicker');
  if (picker) { picker.style.display='inline-block'; picker.value=h; }
}
function toggleThemePicker() {
  document.getElementById('themePicker').classList.toggle('hidden');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#themePicker') && !e.target.closest('[onclick*="toggleThemePicker"]'))
    document.getElementById('themePicker')?.classList.add('hidden');
});

loadSettings().then(init);

// ── Auto-update ──
async function checkUpdate() {
  try {
    const d = await fetch('/api/update/check').then(r => r.json());
    if (d.has_update && d.latest) {
      document.getElementById('updateVersion').textContent = 'v'+d.current+' → v'+d.latest;
      document.getElementById('updateBanner').classList.remove('hidden');
    }
  } catch(e) {}
}
function applyUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.textContent = 'Actualizando...'; btn.disabled = true;
  try {
    if (window.top && window.top.pywebview && window.top.pywebview.api) {
      window.top.pywebview.api.open_update_window();
    } else {
      fetch('/api/update/apply', {method:'POST'}).catch(() => {});
    }
  } catch(e) { btn.textContent = 'Error'; btn.disabled = false; }
}
checkUpdate();
setInterval(checkUpdate, 30 * 60 * 1000);
</script>

<!-- ═══ BANNER DE ACTUALIZACIÓN ═══ -->
<div id="updateBanner" class="hidden fixed bottom-0 left-0 right-0 z-[100] px-5 py-3 flex items-center justify-between gap-3"
     style="background:rgba(46,16,101,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(124,58,237,.4)">
  <div class="flex items-center gap-3">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-purple-400 shrink-0"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    <div>
      <div class="text-white font-bold text-sm">Nueva versión disponible</div>
      <div id="updateVersion" class="text-purple-300 text-xs font-mono"></div>

  </div>
  <div class="flex gap-2 shrink-0">
    <button id="updateBtn" onclick="applyUpdate()"
      class="card-tap bg-purple-600 hover:bg-purple-500 text-white text-sm font-extrabold px-4 py-2 rounded-xl transition-colors cursor-pointer"
      style="box-shadow:0 0 12px rgba(124,58,237,.4)">
      Actualizar
    </button>
    <button onclick="document.getElementById('updateBanner').classList.add('hidden')"
      class="text-purple-400 hover:text-white text-sm px-3 py-2 rounded-xl transition-colors cursor-pointer">
      Después
    </button>
  </div>
</div>

<!-- App Confirm Modal -->
<div id="appConfirmModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center"
     style="background:rgba(0,0,0,.8);backdrop-filter:blur(12px)">
  <div class="modal-in rounded-2xl p-6 max-w-xs w-full mx-4 shadow-2xl"
       style="background:rgba(6,10,30,.98);border:1px solid rgba(255,255,255,.07)">
    <p id="appConfirmMsg" class="text-white text-sm font-semibold leading-relaxed mb-5"></p>
    <div class="flex gap-3 justify-end">
      <button onclick="_appCR(false)" class="card-tap px-4 py-2 rounded-xl text-gray-400 text-sm font-bold transition-colors cursor-pointer"
        style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)">Cancelar</button>
      <button id="appConfirmOk" onclick="_appCR(true)" class="card-tap px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-500 transition-colors cursor-pointer">Confirmar</button>
    </div>
  </div>
</div>
<script>
let _appCR = null;
function appConfirm(msg, okLabel = 'Confirmar') {
  return new Promise(r => {
    _appCR = v => { document.getElementById('appConfirmModal').classList.add('hidden'); _appCR = null; r(v); };
    document.getElementById('appConfirmMsg').textContent = msg;
    document.getElementById('appConfirmOk').textContent = okLabel;
    document.getElementById('appConfirmModal').classList.remove('hidden');
  });
}
</script>
