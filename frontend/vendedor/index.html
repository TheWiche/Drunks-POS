<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Drunks · Vendedor</title>
<script>var _t=localStorage.getItem('drunksPalette');document.documentElement.setAttribute('data-theme',_t==='light'?'light':'dark')</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Easing tokens ── */
:root{
  --ease-out-quint:cubic-bezier(.23,1,.32,1);
  --ease-in-quint:cubic-bezier(.64,0,.78,0);
  --spring:cubic-bezier(.34,1.56,.64,1);
  /* Brand Dark (default) */
  --bg:#0B1120;
  --surface:#0D1929;
  --card:#1E293B;
  --border:#334155;
  --border2:#475569;
  --text:#F8FAFC;
  --muted:#CBD5E1;
  --subtle:#64748B;
  --amber:#FF7A18;
  --amber-dim:rgba(255,122,24,.12);
  --amber-border:rgba(255,122,24,.28);
  --amber-glow:rgba(255,122,24,.22);
  --green:#22C55E;
  --blue:#3B82F6;
  --red:#F87171;
  --glass:#0B1120;
  --glass-dim:rgba(11,17,32,.92);
  --glass-catbar:rgba(11,17,32,.85);
  /* Semantic interactive tokens */
  --interactive-bg:rgba(255,255,255,.04);
  --interactive-hover:rgba(255,255,255,.08);
  --interactive-active:rgba(255,255,255,.12);
  --interactive-border:rgba(255,255,255,.08);
  --divider:rgba(255,255,255,.06);
  --surface-raised:rgba(255,255,255,.02);
  --surface-card:rgba(255,255,255,.03);
  --overlay:rgba(0,0,0,.82);
  --overlay-dark:rgba(0,0,0,.88);
  --scrollbar-thumb:rgba(255,255,255,.1);
  --modal-bg:#111113;
  --modal-bg2:#0A0A0E;
  --bottom-bar:rgba(9,9,11,.95);
  --green-text:#86EFAC;
  --blue-text:#93C5FD;
  --orange-text:#FDBA74;
  --price-text:#4ade80;
}

/* ── Light Mode ── */
html[data-theme=light]{
  --bg:#F8F9FB;
  --surface:#F0F4F8;
  --card:#FFFFFF;
  --border:#E5E7EB;
  --border2:#D1D5DB;
  --text:#1F2937;
  --muted:#64748B;
  --subtle:#94A3B8;
  --amber:#FF6B35;
  --amber-dim:rgba(255,107,53,.12);
  --amber-border:rgba(255,107,53,.28);
  --amber-glow:rgba(255,107,53,.22);
  --green:#22C55E;
  --blue:#3B82F6;
  --red:#EF4444;
  --glass:#F0F4F8;
  --glass-dim:rgba(240,244,248,.96);
  --glass-catbar:rgba(240,244,248,.94);
  /* Semantic interactive tokens — light overrides */
  --interactive-bg:rgba(0,0,0,.04);
  --interactive-hover:rgba(0,0,0,.07);
  --interactive-active:rgba(0,0,0,.11);
  --interactive-border:rgba(0,0,0,.08);
  --divider:rgba(0,0,0,.07);
  --surface-raised:rgba(255,255,255,.8);
  --surface-card:rgba(0,0,0,.02);
  --overlay:rgba(0,0,0,.55);
  --overlay-dark:rgba(0,0,0,.65);
  --scrollbar-thumb:rgba(0,0,0,.15);
  --modal-bg:#FFFFFF;
  --modal-bg2:#F8F9FB;
  --bottom-bar:rgba(240,244,248,.97);
  --green-text:#15803D;
  --blue-text:#1D4ED8;
  --orange-text:#C2410C;
  --price-text:#15803D;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input::placeholder{color:var(--subtle)}
input:focus{outline:none}

/* ── Animations ── */
@keyframes badgePop{
  0%{transform:scale(0) rotate(-20deg)}
  55%{transform:scale(1.3) rotate(4deg)}
  80%{transform:scale(.88)}
  100%{transform:scale(1)}
}
.badge-pop{animation:badgePop .32s var(--spring) forwards}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .2s var(--ease-out-quint) both}

@keyframes cartItemIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.cart-item-in{animation:cartItemIn .22s var(--ease-out-quint) both}

@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-in{animation:sheetIn .3s var(--ease-out-quint)}

@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-in{animation:modalIn .26s var(--ease-out-quint)}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)} 40%{transform:translateX(6px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(4px)}
}
.shake{animation:shake .32s ease}

@keyframes totalBump{0%{transform:scale(1)}35%{transform:scale(1.15)}65%{transform:scale(.97)}100%{transform:scale(1)}}
.total-bump{animation:totalBump .26s var(--spring)}

/* ── Interaction ── */
.card-tap{cursor:pointer;transition:transform 90ms ease-out,box-shadow 150ms var(--ease-out-quint)}
.card-tap:active{transform:scale(.94)}

/* ── Badge z-index fix for CSS Grid stacking context ── */
.prod-wrapper:has(.qty-badge){z-index:5}

/* ── Premium card system (Double-Bezel) ── */
.card-shell{
  border-radius:20px;
  border:1px solid;
  padding:2.5px;
  transition:border-color 220ms cubic-bezier(.23,1,.32,1),transform 90ms ease-out;
  position:relative;
}
.card-shell:active{transform:scale(.94)}
.card-core{
  border-radius:16px;
  overflow:hidden;
  background:var(--surface);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:9.5rem;
  padding:.875rem .75rem;
  text-align:center;
  position:relative;
}
.card-bloom{
  position:absolute;
  bottom:0;left:-20%;right:-20%;
  height:55%;
  border-radius:50%;
  transform:translateY(30%);
  filter:blur(22px);
  pointer-events:none;
}

/* ── Agotado ribbon ── */
.ribbon-sold{position:relative}
.ribbon-sold .card-core::before{
  content:'AGOTADO';
  position:absolute;top:10px;left:-26px;
  background:rgba(239,68,68,.9);
  color:#fff;font-size:7.5px;font-weight:900;letter-spacing:.14em;
  padding:2.5px 36px;transform:rotate(-45deg);
  pointer-events:none;z-index:10;
}

/* ── Qty badge (overflow-visible trick) ── */
.prod-wrapper{position:relative;overflow:visible}
.qty-badge{
  position:absolute;top:-7px;right:-7px;z-index:20;
  min-width:22px;height:22px;padding:0 5px;
  border-radius:99px;
  background:var(--amber);color:#09090B;
  font-size:.68rem;font-weight:800;letter-spacing:-.01em;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2.5px var(--bg),0 2px 8px rgba(0,0,0,.4);
  pointer-events:none;
}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  .card-tap{transition:opacity 150ms linear!important;transform:none!important}
  .badge-pop,.slide-up,.cart-item-in,.sheet-in,.modal-in,.shake,.total-bump{animation:none!important}
}
</style>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:var(--bg)!important;color:var(--text)!important}
</style>
</head>
<body class="min-h-screen pb-28">

<!-- ═══ HEADER ═══ -->
<div class="sticky top-0 z-40" style="background:var(--glass-dim);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border)">
  <div class="flex items-center gap-3 px-4 pt-3.5 pb-2.5">
    <!-- Logo -->
    <div class="flex items-center gap-2.5 shrink-0">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center"
           style="background:linear-gradient(135deg,#FF8A38,var(--amber));box-shadow:0 0 14px var(--amber-glow)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#09090B"><path d="M5 3h12v2H5V3zm0 4h12l-1.5 9H6.5L5 7zm3 2v5h1V9H8zm3 0v5h1V9h-1zm3 0v5h1V9h-1z"/></svg>
      </div>
      <div>
        <div class="text-[9px] font-black tracking-[.22em] leading-none" style="color:var(--amber)">DRUNKS</div>
        <div class="text-[8px] tracking-widest mt-0.5" style="color:var(--subtle)">VENDEDOR</div>
      </div>
    </div>
    <!-- Palette + Total -->
    <div class="ml-auto flex items-center gap-3">
      <button id="themeToggleBtn" onclick="toggleTheme()" aria-label="Modo claro/oscuro"
        class="w-8 h-8 rounded-lg border flex items-center justify-center transition-colors"
        style="background:var(--interactive-bg);border-color:var(--border);color:var(--subtle)"
        onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--subtle)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
      </button>
      <div class="flex flex-col items-end">
        <span class="text-[8.5px] font-bold tracking-[.18em]" style="color:var(--subtle)">TOTAL</span>
        <div id="totalDisplay" class="font-extrabold text-2xl leading-none tabular-nums" style="color:var(--text);letter-spacing:-.03em">$0</div>
      </div>
    </div>
  </div>
  <!-- Cliente -->
  <div class="px-4 pb-3">
    <input id="clientName" type="text" placeholder="Nombre del cliente..."
      autocomplete="off" autocorrect="off" spellcheck="false"
      class="w-full rounded-xl px-4 py-2.5 text-sm font-semibold transition-all"
      style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--text)">
  </div>
</div>

<!-- ═══ CATEGORÍAS ═══ -->
<div class="sticky z-30" style="top:103px;background:var(--glass-catbar);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)">
  <div id="catBar" class="flex gap-2 px-4 py-2.5 overflow-x-auto" style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
    <span style="color:var(--subtle);font-size:.75rem">Cargando...</span>
  </div>
</div>

<!-- ═══ PRODUCTOS ═══ -->
<div class="px-3 pt-3 pb-1">
  <div id="prodsGrid" class="grid grid-cols-2 gap-3"></div>
</div>

<!-- ═══ CARRITO ═══ -->
<div class="px-3 pb-2 mt-4">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="color:var(--subtle)"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.46 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span class="text-[10px] font-bold tracking-[.18em]" style="color:var(--subtle)">CARRITO</span>
    </div>
    <button id="clearCartBtn" onclick="clearCart()" class="hidden text-[10px] font-semibold transition-colors cursor-pointer" style="color:var(--subtle)"
      onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--subtle)'">✕ Limpiar</button>
  </div>
  <div id="cartList"></div>
</div>

<!-- ═══ NOTAS ═══ -->
<div class="px-3 pb-28">
  <div id="notesLabel" class="text-[10px] font-bold tracking-[.18em] mb-2.5" style="color:var(--subtle)">NOTAS RÁPIDAS</div>
  <div id="notesBar" class="flex flex-wrap gap-1.5 mb-3"></div>
  <div class="flex gap-2">
    <input id="freeNote" type="text" placeholder="Nota manual..."
      class="flex-1 rounded-xl px-3 py-2.5 text-sm transition-all"
      style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--text)">
    <button onclick="applyFreeNote()"
      class="card-tap text-sm font-black px-5 py-2.5 rounded-xl shrink-0 transition-all"
      style="background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber)">+</button>
  </div>
</div>

<!-- ═══ BARRA INFERIOR ═══ -->
<div class="fixed bottom-0 left-0 right-0 z-40 px-3 py-3"
     style="background:var(--bottom-bar);backdrop-filter:blur(28px);border-top:1px solid var(--divider)">
  <div class="grid grid-cols-2 gap-3">
    <button onclick="openConfirm('Efectivo')"
      class="card-tap relative border py-4 rounded-2xl flex flex-col items-center gap-1.5 transition-all"
      style="background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="color:var(--price-text)"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
      <span class="text-xs font-black tracking-wider" style="color:var(--green-text)">EFECTIVO</span>
    </button>
    <button onclick="openConfirm('Transferencia')"
      class="card-tap relative border py-4 rounded-2xl flex flex-col items-center gap-1.5 transition-all"
      style="background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.3)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="color:#60a5fa"><path d="M17 1.01 7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
      <span class="text-xs font-black tracking-wider" style="color:var(--blue-text)">TRANSFERENCIA</span>
    </button>
  </div>
</div>


<!-- ═══ BASE SHEET ═══ -->
<div id="baseSheet" class="fixed inset-0 z-50 hidden items-end">
  <div class="absolute inset-0" style="background:var(--overlay);backdrop-filter:blur(6px)" onclick="closeBase()"></div>
  <div class="sheet-in relative w-full rounded-t-3xl shadow-2xl overflow-hidden"
       style="background:var(--modal-bg);border-top:1px solid var(--interactive-border)">
    <div class="flex justify-center pt-3 pb-1">
      <div class="w-9 h-1 rounded-full" style="background:var(--interactive-active)"></div>
    </div>
    <div class="px-5 pb-8 max-h-[70vh] overflow-y-auto">
      <div id="baseProdName" class="text-xl font-extrabold text-center mt-3 leading-tight" style="color:var(--text)"></div>
      <div class="text-[8.5px] text-center tracking-[.28em] mt-1 mb-5 font-black" style="color:var(--amber)">SELECCIONA LA BASE</div>
      <div id="baseTypeSections"></div>
      <button onclick="closeBase()" class="mt-4 w-full py-3 rounded-2xl text-sm font-semibold cursor-pointer transition-colors"
        style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--muted)">
        Cancelar
      </button>
    </div>
  </div>
</div>

<!-- ═══ CONFIRMACIÓN ═══ -->
<div id="confirmModal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center p-3"
     style="background:var(--overlay-dark);backdrop-filter:blur(12px)">
  <div class="modal-in rounded-3xl w-full max-w-md shadow-2xl overflow-hidden"
       style="background:var(--modal-bg);border:1px solid var(--interactive-border)">
    <!-- Header -->
    <div class="relative px-6 py-5 text-center overflow-hidden"
         style="background:var(--surface)">
      <div class="absolute inset-0" style="background:radial-gradient(ellipse at 50% -20%,var(--amber-glow),transparent 60%)"></div>
      <div class="relative">
        <div class="w-10 h-10 rounded-2xl mx-auto mb-3 flex items-center justify-center"
             style="background:var(--amber-dim);border:1px solid var(--amber-border)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--amber)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        </div>
        <h2 class="text-base font-extrabold tracking-tight" style="color:var(--text)">Confirmar Pedido</h2>
        <p class="text-xs mt-0.5" style="color:var(--muted)">Revisa antes de mandar a cocina</p>
      </div>
    </div>
    <!-- Body -->
    <div class="px-5 py-4 max-h-64 overflow-y-auto space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-[9px] font-bold tracking-[.18em]" style="color:var(--subtle)">CLIENTE</div>
          <div id="smCliente" class="font-extrabold text-2xl leading-tight" style="color:var(--text)"></div>
        </div>
        <div id="smMetodo" class="px-3 py-1.5 rounded-full text-xs font-bold shrink-0 mt-1 border"></div>
      </div>
      <div class="pt-2 border-t" style="border-color:var(--divider)">
        <div id="smItems" class="space-y-2"></div>
      </div>
      <div class="pt-3 border-t flex justify-between items-center" style="border-color:var(--border)">
        <span class="text-sm font-semibold" style="color:var(--muted)">TOTAL</span>
        <span id="smTotal" class="font-extrabold text-2xl tabular-nums" style="color:var(--text)"></span>
      </div>
    </div>
    <!-- Actions -->
    <div class="px-5 pb-5 pt-1 space-y-2">
      <button id="confirmBtn" onclick="sendOrder()"
        class="card-tap w-full font-extrabold py-4 rounded-2xl text-sm cursor-pointer"
        style="background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.4);color:var(--green-text)">
        Confirmar — Mandar a Cocina
      </button>
      <button onclick="closeConfirm()"
        class="w-full py-3 rounded-2xl text-sm font-semibold cursor-pointer transition-colors"
        style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--muted)">
        Cancelar — Seguir Editando
      </button>
    </div>
  </div>
</div>

<!-- ═══ UPDATE BANNER ═══ -->
<div id="updateBanner" class="hidden fixed bottom-0 left-0 right-0 z-[100] px-5 py-3 flex items-center justify-between gap-3"
     style="background:var(--modal-bg);backdrop-filter:blur(20px);border-top:1px solid var(--amber-border)">
  <div class="flex items-center gap-3">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--amber);flex-shrink:0"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    <div>
      <div class="text-sm font-bold" style="color:var(--text)">Nueva versión disponible</div>
      <div id="updateVersion" class="text-xs font-mono" style="color:var(--amber)"></div>
    </div>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="updateBtn" onclick="applyUpdate()"
      class="card-tap text-sm font-extrabold px-4 py-2 rounded-xl cursor-pointer"
      style="background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber)">
      Actualizar
    </button>
    <button onclick="document.getElementById('updateBanner').classList.add('hidden')"
      class="text-sm px-3 py-2 rounded-xl cursor-pointer transition-colors" style="color:var(--muted)">
      Después
    </button>
  </div>
</div>

<!-- ═══ APP CONFIRM ═══ -->
<div id="appConfirmModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center"
     style="background:rgba(0,0,0,.8);backdrop-filter:blur(12px)">
  <div class="modal-in rounded-2xl p-6 max-w-xs w-full mx-4 shadow-2xl"
       style="background:var(--modal-bg);border:1px solid var(--border)">
    <p id="appConfirmMsg" class="text-sm font-semibold leading-relaxed mb-5" style="color:var(--text)"></p>
    <div class="flex gap-3 justify-end">
      <button onclick="_appCR(false)" class="card-tap px-4 py-2 rounded-xl text-sm font-bold cursor-pointer"
        style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--muted)">Cancelar</button>
      <button id="appConfirmOk" onclick="_appCR(true)" class="card-tap px-4 py-2 rounded-xl text-sm font-bold cursor-pointer"
        style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:var(--red)">Confirmar</button>
    </div>
  </div>
</div>

<script>
function hexToRgb(hex) {
  const h = (hex||'#f59e0b').replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(x=>x+x).join('') : h, 16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function catStyle(cat, active) {
  const [r,g,b] = hexToRgb(cat?.color);
  if (active) return `background:rgba(${r},${g},${b},.18);border-color:rgba(${r},${g},${b},.55);box-shadow:0 0 18px rgba(${r},${g},${b},.18)`;
  return `background:rgba(${r},${g},${b},.07);border-color:rgba(${r},${g},${b},.18)`;
}
function catPillStyle(cat, active) {
  const [r,g,b] = hexToRgb(cat?.color);
  if (active) return `background:rgba(${r},${g},${b},.85);color:#fff;border-color:rgba(${r},${g},${b},.7)`;
  return `background:var(--interactive-bg);border-color:var(--interactive-border);color:var(--muted)`;
}

let availBases = [];
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let products = [], categories = [], quickNotes = [];
let cart = {};
let lastKey = null;
let activeCat = null;
let pendingProd = null;
let pendingMethod = null;

async function init() {
  await Promise.all([loadCats(), loadProducts(), loadNotes()]);
}

async function loadCats() {
  try { const r = await fetch('/api/categorias'); categories = await r.json(); }
  catch(e) { categories = []; }
  renderCats();
}

async function loadProducts() {
  try { const r = await fetch('/api/productos'); products = await r.json(); }
  catch(e) { products = []; }
  renderProds();
}

async function loadNotes() {
  try { const r = await fetch('/api/notas_rapidas'); quickNotes = await r.json(); }
  catch(e) { quickNotes = []; }
  renderNotes();
}

function catById(id) { return categories.find(c => c.id === id) || null; }

function renderCats() {
  const bar = document.getElementById('catBar');
  const activeStyle = 'background:var(--amber);color:#09090B;border-color:var(--amber);font-weight:700';
  const inactiveStyle = 'background:var(--interactive-bg);border-color:var(--interactive-border);color:var(--muted)';
  const all = `<button onclick="selectCat(null)"
    class="shrink-0 px-4 py-1.5 rounded-full text-xs font-bold border cursor-pointer transition-all"
    style="${activeCat===null ? activeStyle : inactiveStyle}">
    Todas
  </button>`;
  bar.innerHTML = all + categories.map(c => {
    const isActive = activeCat === c.id;
    const st = catPillStyle(c, isActive);
    return `<button onclick="selectCat(${c.id})"
      class="shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-bold border cursor-pointer transition-all"
      style="${st}">
      <span>${c.icono||'🏷️'}</span>${c.nombre}
    </button>`;
  }).join('');
}

function selectCat(id) {
  activeCat = id;
  renderCats();
  renderProds();
}

function totalQtyForProd(id) {
  return Object.entries(cart)
    .filter(([k]) => k.startsWith(id+'|'))
    .reduce((s,[,v]) => s + v.qty, 0);
}
function isActiveProd(id) {
  return lastKey && lastKey.startsWith(id+'|');
}

function _buildProdCardHTML(p) {
  const qty    = totalQtyForProd(p.id);
  const avail  = !!p.disponible;
  const cat    = catById(p.categoria_id);
  const active = isActiveProd(p.id);
  const isMich = !!p.tiene_base;
  const icon   = cat?.icono || '🍾';
  const [r,g,b] = hexToRgb(cat?.color);

  const borderCol = avail ? `rgba(${r},${g},${b},${active ? '.45' : '.16'})` : 'var(--interactive-border)';
  const shellBg   = active ? `rgba(${r},${g},${b},.07)` : 'var(--surface-raised)';
  const bloomOp   = active ? .5 : .2;
  const soldStyle = !avail ? ';opacity:.22;filter:grayscale(1);pointer-events:none' : '';

  return `<div id="prod-card-${p.id}" class="prod-wrapper${avail ? '' : ' ribbon-sold'}" style="${qty > 0 ? 'z-index:5' : ''}">
    <div class="card-shell select-none"
      style="border-color:${borderCol};background:${shellBg};cursor:${avail ? 'pointer' : 'not-allowed'}${soldStyle}"
      ${avail ? `onclick="tapProd(${p.id})"` : ''}>
      <div class="card-core">
        <div class="card-bloom" style="background:rgb(${r},${g},${b});opacity:${bloomOp}"></div>
        ${isMich ? `<div style="position:absolute;top:7px;left:7px;font-size:6px;font-weight:900;letter-spacing:.15em;padding:2px 6px;border-radius:99px;background:rgba(${r},${g},${b},.18);border:1px solid rgba(${r},${g},${b},.3);color:rgba(${r},${g},${b},1);z-index:1">BASE</div>` : ''}
        <div style="font-size:2.4rem;line-height:1;margin-bottom:.5rem;position:relative;z-index:1">${icon}</div>
        <div style="font-size:.76rem;font-weight:700;line-height:1.3;color:var(--text);position:relative;z-index:1;text-wrap:balance;padding:0 4px">${p.nombre}</div>
        <div style="font-size:.78rem;font-weight:800;margin-top:.4rem;font-variant-numeric:tabular-nums;position:relative;z-index:1;color:${active ? 'var(--amber)' : 'var(--muted)'}">$${Math.round(p.precio).toLocaleString('es-CO')}</div>
      </div>
    </div>
    ${qty > 0 ? `<div class="qty-badge badge-pop">${qty}</div>` : ''}
  </div>`;
}

function _refreshProdCard(prodId) {
  const p  = products.find(x => x.id === prodId);
  const el = document.getElementById('prod-card-' + prodId);
  if (!p || !el) { renderProds(); return; }
  el.outerHTML = _buildProdCardHTML(p);
}

function renderProds() {
  const grid = document.getElementById('prodsGrid');
  const list = activeCat !== null ? products.filter(p => p.categoria_id === activeCat) : products;
  if (!list.length) {
    grid.innerHTML = `<div class="col-span-2 text-center text-sm py-12" style="color:var(--subtle)">Sin productos en esta categoría</div>`;
    return;
  }
  grid.innerHTML = list.map(_buildProdCardHTML).join('');
}

function tapProd(id) {
  const p = products.find(x => x.id === id);
  if (!p || !p.disponible) return;
  if (p.tiene_base) {
    openBase(p);
  } else {
    const key = id + '|';
    lastKey = key;
    if (!cart[key]) { cart[key] = { product: p, qty: 1, base: '', obs: '' }; }
    else { cart[key].qty++; }
    _refreshProdCard(id); renderCart(); renderNotes(); updateTotal();
  }
}

async function openBase(product) {
  pendingProd = product;
  document.getElementById('baseProdName').textContent = product.nombre;
  const container = document.getElementById('baseTypeSections');
  container.innerHTML = `<div class="text-center py-4 text-sm" style="color:var(--subtle)">Cargando...</div>`;
  const s = document.getElementById('baseSheet');
  s.classList.remove('hidden'); s.classList.add('flex');
  try {
    const r = await fetch('/api/productos/'+product.id+'/bases');
    if (!r.ok) throw new Error();
    const data = await r.json();
    availBases = Array.isArray(data) ? data : [];
  } catch(e) { availBases = []; }
  renderBaseSheet();
}

function renderBaseSheet() {
  const byTipo = {};
  availBases.filter(b => b.disponible).forEach(b => {
    const key = b.tipo_nombre || b.tipo || 'Otros';
    if (!byTipo[key]) byTipo[key] = { icono: b.tipo_icono || '🍹', items: [] };
    byTipo[key].items.push(b);
  });
  const container = document.getElementById('baseTypeSections');
  if (!Object.keys(byTipo).length) {
    container.innerHTML = `<div class="text-center py-4 text-sm" style="color:var(--subtle)">Sin bases disponibles</div>`;
    return;
  }
  container.innerHTML = Object.entries(byTipo).map(([tipoNombre, {icono, items}]) => `
    <div class="mb-5">
      <div class="flex items-center gap-2 text-[9px] font-black tracking-[.2em] mb-3" style="color:var(--subtle)">
        <span class="text-base">${icono}</span> ${tipoNombre.toUpperCase()}
      </div>
      <div class="grid grid-cols-${Math.min(items.length,3)} gap-2">
        ${items.map(b => `
          <button data-base="${b.tipo_nombre||b.tipo}: ${b.nombre}" onclick="selectBase(this.dataset.base)"
            class="card-tap rounded-2xl py-4 text-sm font-bold leading-tight cursor-pointer transition-all"
            style="background:var(--interactive-bg);border:1px solid var(--border);color:var(--text)">
            ${icono}<br><span style="font-size:.8rem">${esc(b.nombre)}</span>
          </button>`).join('')}
      </div>
    </div>`).join('');
}

function closeBase() {
  const s = document.getElementById('baseSheet');
  s.classList.add('hidden'); s.classList.remove('flex');
  pendingProd = null;
}

function selectBase(base) {
  if (!pendingProd) return;
  const key = pendingProd.id + '|' + base;
  const prodId = pendingProd.id;
  lastKey = key;
  if (!cart[key]) { cart[key] = { product: pendingProd, qty: 1, base, obs: '' }; }
  else { cart[key].qty++; }
  closeBase();
  _refreshProdCard(prodId); renderCart(); renderNotes(); updateTotal();
}

function renderCart() {
  const el    = document.getElementById('cartList');
  const items = Object.entries(cart);
  const btn   = document.getElementById('clearCartBtn');
  if (!items.length) {
    el.innerHTML = `<div class="text-center text-sm py-8 rounded-2xl border border-dashed" style="color:var(--subtle);border-color:var(--interactive-border)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="mx-auto mb-2" style="opacity:.25"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.46 4H5.21l-.94-2H1zm16 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      Toca un producto para agregarlo
    </div>`;
    btn.classList.add('hidden');
    return;
  }
  btn.classList.remove('hidden');
  el.innerHTML = items.map(([key, item], idx) => {
    const isActive = key === lastKey;
    return `<div
        class="cart-item-in flex items-start gap-2.5 rounded-2xl px-3 py-2.5 mb-2 border cursor-pointer transition-all"
        style="animation-delay:${idx*25}ms;${isActive
          ? 'background:var(--amber-dim);border-color:var(--amber-border)'
          : 'background:var(--surface-card);border-color:var(--divider)'}"
        onclick="selectCartItem('${key.replace(/'/g,"\\\'")}')">
      <div class="flex-1 min-w-0">
        <div class="text-sm font-bold truncate" style="color:var(--text)">${item.product.nombre}</div>
        ${item.base ? `<div class="text-xs font-semibold mt-0.5" style="color:var(--amber)">↳ ${item.base}</div>` : ''}
        ${item.obs  ? `<div class="text-xs mt-0.5" style="color:#fde047;opacity:.7">${item.obs}</div>` : ''}
      </div>
      <div class="flex items-center gap-2 shrink-0 mt-0.5">
        <div class="flex items-center gap-0.5 rounded-full" style="background:var(--interactive-bg);border:1px solid var(--interactive-border);padding:2px">
          <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();decreaseItem(this.dataset.key)"
            class="w-7 h-7 rounded-full text-base font-bold flex items-center justify-center cursor-pointer transition-colors hover:bg-white/10"
            style="color:var(--text)">−</button>
          <span class="font-extrabold text-sm w-5 text-center tabular-nums" style="color:var(--text)">${item.qty}</span>
          <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();increaseItem(this.dataset.key)"
            class="w-7 h-7 rounded-full text-base font-bold flex items-center justify-center cursor-pointer transition-colors hover:bg-white/10"
            style="color:var(--text)">+</button>
        </div>
        <div class="text-sm font-bold tabular-nums w-16 text-right" style="color:var(--price-text)">$${Math.round(item.product.precio * item.qty).toLocaleString('es-CO')}</div>
        <button data-key="${key.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();removeItem(this.dataset.key)"
          class="text-lg leading-none w-6 h-6 flex items-center justify-center cursor-pointer transition-colors"
          style="color:var(--subtle)" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--subtle)'">✕</button>
      </div>
    </div>`;
  }).join('');
}

function selectCartItem(key) {
  lastKey = key;
  renderCart();
  renderNotes();
}

function increaseItem(key) {
  if (cart[key]) { cart[key].qty++; renderCart(); updateTotal(); }
}

function decreaseItem(key) {
  if (!cart[key]) return;
  cart[key].qty--;
  if (cart[key].qty <= 0) { delete cart[key]; if (lastKey === key) lastKey = null; }
  _refreshProdCard(parseInt(key.split('|')[0])); renderCart(); renderNotes(); updateTotal();
}

function removeItem(key) {
  const prodId = parseInt(key.split('|')[0]);
  delete cart[key];
  if (lastKey === key) lastKey = null;
  _refreshProdCard(prodId); renderCart(); renderNotes(); updateTotal();
}

async function clearCart() {
  if (!await appConfirm('Limpiar todo el carrito?', 'Limpiar')) return;
  cart = {}; lastKey = null;
  renderProds(); renderCart(); renderNotes(); updateTotal();
}

function updateTotal() {
  const t = Object.values(cart).reduce((s, i) => s + i.product.precio * i.qty, 0);
  const el = document.getElementById('totalDisplay');
  el.textContent = '$' + Math.round(t).toLocaleString('es-CO');
  el.classList.remove('total-bump');
  void el.offsetWidth;
  el.classList.add('total-bump');
}

function renderNotes() {
  const lbl  = document.getElementById('notesLabel');
  const bar  = document.getElementById('notesBar');
  let active = lastKey ? cart[lastKey] : null;

  if (active) {
    const prod = active.product;
    lbl.innerHTML = `NOTAS PARA: <span style="color:var(--amber)">${prod.nombre}${active.base ? ' · ' + active.base : ''}</span>`;
  } else {
    lbl.textContent = 'NOTAS RÁPIDAS';
  }

  const catId = active ? active.product.categoria_id : null;
  const shown = quickNotes.filter(n => n.categoria_id === null || n.categoria_id === catId);

  if (!shown.length) {
    bar.innerHTML = `<span class="text-xs" style="color:var(--subtle)">Sin notas configuradas.</span>`;
    return;
  }

  const appliedNotes = (active && active.obs) ? active.obs.split(', ').map(x=>x.trim()).filter(Boolean) : [];

  bar.innerHTML = shown.map(n => {
    const isCtx     = n.categoria_id !== null;
    const isApplied = appliedNotes.includes(n.texto);
    let st;
    if (isApplied) st = 'background:var(--amber-dim);border-color:var(--amber-border);color:var(--amber)';
    else if (isCtx) st = 'background:rgba(120,53,15,.25);border-color:rgba(245,158,11,.2);color:#fbbf24';
    else st = 'background:var(--interactive-bg);border-color:var(--interactive-border);color:var(--muted)';
    return `<button data-note="${n.texto.replace(/"/g,'&quot;')}" onclick="applyNote(this.dataset.note)"
      class="card-tap text-xs px-3 py-1.5 rounded-full border font-semibold cursor-pointer transition-all"
      style="${st}">
      ${isApplied ? '✓ ' : ''}${n.texto}
    </button>`;
  }).join('');
}

function applyNote(note) {
  if (!lastKey || !cart[lastKey]) { showToast('Toca una bebida del carrito primero', 'warn'); return; }
  const item  = cart[lastKey];
  const notes = item.obs ? item.obs.split(', ').map(n => n.trim()).filter(Boolean) : [];
  if (notes.includes(note)) {
    item.obs = notes.filter(n => n !== note).join(', ');
    renderCart(); renderNotes();
    showToast('Nota eliminada', 'warn');
  } else {
    item.obs = notes.length ? notes.join(', ') + ', ' + note : note;
    renderCart(); renderNotes();
    showToast(note, 'ok');
  }
}

function applyFreeNote() {
  const inp  = document.getElementById('freeNote');
  const note = inp.value.trim();
  if (!note) return;
  if (!lastKey || !cart[lastKey]) { showToast('Toca una bebida del carrito primero', 'warn'); return; }
  const item = cart[lastKey];
  item.obs = item.obs ? item.obs + ', ' + note : note;
  inp.value = '';
  renderCart();
  showToast('Nota agregada', 'ok');
}

function openConfirm(method) {
  const nombre = document.getElementById('clientName').value.trim();
  const inp    = document.getElementById('clientName');
  if (!nombre) {
    inp.classList.add('shake');
    inp.style.borderColor = 'rgba(239,68,68,.6)';
    inp.focus();
    setTimeout(() => { inp.classList.remove('shake'); inp.style.borderColor = ''; }, 800);
    showToast('Escribe el nombre del cliente', 'error');
    return;
  }
  if (!Object.keys(cart).length) { showToast('El carrito está vacío', 'error'); return; }

  pendingMethod = method;
  const items   = Object.values(cart);
  const total   = items.reduce((s, i) => s + i.product.precio * i.qty, 0);

  document.getElementById('smCliente').textContent = nombre;
  const mb = document.getElementById('smMetodo');
  mb.textContent = (method === 'Efectivo' ? '$ ' : '→ ') + method;
  mb.style.cssText = method === 'Efectivo'
    ? 'background:rgba(34,197,94,.15);color:var(--green-text);border:1px solid rgba(34,197,94,.35)'
    : 'background:rgba(59,130,246,.15);color:var(--blue-text);border:1px solid rgba(59,130,246,.35)';

  document.getElementById('smItems').innerHTML = items.map(i => `
    <div class="flex items-start gap-2 rounded-xl px-3 py-2 border" style="background:var(--surface-card);border-color:var(--divider)">
      <span class="text-xs font-extrabold px-2 py-0.5 rounded-md shrink-0" style="background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)">${i.qty}x</span>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-bold" style="color:var(--text)">${i.product.nombre}</div>
        ${i.base ? `<div class="text-xs font-semibold" style="color:var(--amber)">↳ ${i.base}</div>` : ''}
        ${i.obs  ? `<div class="text-xs" style="color:var(--orange-text);opacity:.8">${i.obs}</div>` : ''}
      </div>
      <div class="text-sm font-bold tabular-nums shrink-0" style="color:var(--price-text)">$${Math.round(i.product.precio * i.qty).toLocaleString('es-CO')}</div>
    </div>`).join('');

  document.getElementById('smTotal').textContent = '$' + Math.round(total).toLocaleString('es-CO');
  const m = document.getElementById('confirmModal');
  m.classList.remove('hidden'); m.classList.add('flex');
}

function closeConfirm() {
  const m = document.getElementById('confirmModal');
  m.classList.add('hidden'); m.classList.remove('flex');
  pendingMethod = null;
}

async function sendOrder() {
  const btn     = document.getElementById('confirmBtn');
  const cliente = document.getElementById('clientName').value.trim();
  const items   = Object.values(cart);
  const total   = items.reduce((s, i) => s + i.product.precio * i.qty, 0);
  const method  = pendingMethod;

  btn.disabled = true; btn.textContent = 'Enviando...';

  const cartSnapshot = { ...cart };
  cart = {}; lastKey = null;
  document.getElementById('clientName').value = '';
  renderProds(); renderCart(); renderNotes(); updateTotal();
  closeConfirm();
  showToast('Pedido enviado a cocina', 'ok');

  try {
    const r = await fetch('/api/pedidos', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cliente, metodo_pago: method, total,
        items: items.map(i => ({
          producto_id:   i.product.id,
          cantidad:      i.qty,
          observaciones: [i.base, i.obs].filter(Boolean).join(' | '),
        })),
      }),
    });
    if (!r.ok) {
      cart = cartSnapshot;
      renderProds(); renderCart(); renderNotes(); updateTotal();
      showToast('Error al enviar — carrito restaurado', 'error');
    }
  } catch(e) {
    cart = cartSnapshot;
    renderProds(); renderCart(); renderNotes(); updateTotal();
    showToast('Sin conexión — carrito restaurado', 'error');
  }
  btn.disabled = false; btn.textContent = 'Confirmar — Mandar a Cocina';
}

function showToast(msg, type) {
  const colors = {
    ok:    {border:'rgba(34,197,94,.4)',  text:'#86efac', bg:'rgba(5,46,22,.97)'},
    error: {border:'rgba(239,68,68,.4)',  text:'#fca5a5', bg:'rgba(69,10,10,.97)'},
    warn:  {border:'rgba(245,158,11,.35)',text:'#fcd34d', bg:'rgba(66,32,6,.97)'},
  };
  const c = colors[type] || colors.ok;
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;top:5rem;left:50%;transform:translateX(-50%) translateY(-8px);opacity:0;
    background:${c.bg};border:1px solid ${c.border};color:${c.text};
    font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;padding:.5rem 1.2rem;border-radius:1rem;
    z-index:200;pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px);
    transition:transform .22s cubic-bezier(.23,1,.32,1),opacity .22s ease-out;`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.transform='translateX(-50%) translateY(0)'; t.style.opacity='1'; });
  setTimeout(() => {
    t.style.transform='translateX(-50%) translateY(-10px)'; t.style.opacity='0';
    setTimeout(() => t.remove(), 250);
  }, 2200);
}

window.addEventListener('focus', loadNotes);
window.addEventListener('focus', loadProducts);

function saveSetting(key, value) {
  localStorage.setItem(key, value);
  fetch('/api/settings/'+key, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  }).catch(()=>{});
}
async function loadSettings() {
  try {
    const s = await fetch('/api/settings').then(r=>r.json());
    var pal = s.palette || localStorage.getItem('drunksPalette') || 'dark';
    if (!['dark','light'].includes(pal)) pal = 'dark';
    applyTheme(pal);
    Object.entries(s).forEach(([k,v]) => localStorage.setItem(k, v));
  } catch(e) {
    applyTheme(localStorage.getItem('drunksPalette') || 'dark');
  }
}

function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(t === 'light' ? 'dark' : 'light');
}
function applyTheme(t) {
  t = (t === 'light') ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  saveSetting('drunksPalette', t); saveSetting('palette', t);
  var btn = document.getElementById('themeToggleBtn');
  if (btn) btn.innerHTML = t === 'dark'
    ? '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/></svg>';
}

async function checkUpdate() {
  try {
    const d = await fetch('/api/update/check').then(r => r.json());
    if (d.has_update && d.latest) {
      document.getElementById('updateVersion').textContent = 'v'+d.current+' → v'+d.latest;
      document.getElementById('updateBanner').classList.remove('hidden');
    }
  } catch(e) {}
}
function applyUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.textContent = 'Actualizando...'; btn.disabled = true;
  try {
    if (window.top?.pywebview?.api) window.top.pywebview.api.open_update_window();
    else fetch('/api/update/apply', {method:'POST'}).catch(()=>{});
  } catch(e) { btn.textContent = 'Error'; btn.disabled = false; }
}

let _appCR = null;
function appConfirm(msg, okLabel='Confirmar') {
  return new Promise(r => {
    _appCR = v => { document.getElementById('appConfirmModal').classList.add('hidden'); _appCR = null; r(v); };
    document.getElementById('appConfirmMsg').textContent = msg;
    document.getElementById('appConfirmOk').textContent = okLabel;
    document.getElementById('appConfirmModal').classList.remove('hidden');
  });
}

loadSettings().then(init);
checkUpdate();
setInterval(checkUpdate, 30*60*1000);
window.addEventListener('viewMounted', () => { loadProducts(); loadNotes(); });
</script>
