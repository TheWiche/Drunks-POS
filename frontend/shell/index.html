<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drunks POS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0d0d1a}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{
  background:#0d0d1a;border-bottom:1px solid #1e1e35;
  height:46px;display:flex;align-items:center;padding:0 14px;gap:6px;
  flex-shrink:0;user-select:none;-webkit-user-select:none
}
.logo{font-family:'Segoe UI',sans-serif;font-weight:800;font-size:.95rem;
  color:#fff;display:flex;align-items:center;gap:6px;margin-right:14px;white-space:nowrap}
.nav-btn{
  font-family:'Segoe UI',sans-serif;font-size:.8rem;font-weight:600;
  color:#8b8ba8;background:transparent;border:1px solid transparent;
  border-radius:8px;padding:5px 13px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:5px;white-space:nowrap
}
.nav-btn:hover{background:#1e1e35;color:#fff}
.nav-btn.active{background:#2d1f6e;color:#c4b5fd;border-color:#7c3aed55}
.spacer{flex:1}
.fs-btn{
  font-size:.9rem;line-height:1;background:transparent;border:1px solid transparent;
  border-radius:8px;padding:5px 9px;cursor:pointer;color:#8b8ba8;transition:.15s;
  display:flex;align-items:center;justify-content:center
}
.fs-btn:hover{background:#1e1e35;color:#fff}
.upd-pill{
  display:none;align-items:center;gap:7px;
  background:#7c3aed22;border:1px solid #7c3aed55;border-radius:99px;
  padding:4px 13px 4px 9px;cursor:pointer;
  animation:pulse 2s infinite
}
.upd-pill:hover{background:#7c3aed44}
.upd-dot{width:8px;height:8px;background:#7c3aed;border-radius:50%;flex-shrink:0}
.upd-txt{font-size:.75rem;font-weight:700;color:#c4b5fd;font-family:'Segoe UI',sans-serif}
.lan-pill{
  display:none;align-items:center;gap:6px;
  background:#0f2a1a;border:1px solid #166534;border-radius:99px;
  padding:4px 11px 4px 9px;cursor:pointer;user-select:all
}
.lan-pill:hover{background:#166534}
.lan-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;flex-shrink:0}
.lan-txt{font-size:.7rem;font-weight:600;color:#86efac;font-family:monospace}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.4)}
  50%{box-shadow:0 0 0 6px rgba(124,58,237,0)}
}
#app-viewport{
  position:relative;flex:1;overflow:hidden;
}
.view-frame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;opacity:0;transform:scale(0.975);
  transition:opacity .22s ease,transform .22s ease;
  pointer-events:none;will-change:opacity,transform;
}
.view-frame.active{
  opacity:1;transform:scale(1);pointer-events:auto;
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">🍺 Drunks POS</div>
    <button class="nav-btn active" id="btn-vendedor" onclick="loadView('vendedor')">🛒 Vendedor</button>
    <button class="nav-btn"        id="btn-cocina"   onclick="loadView('cocina')">👨‍🍳 Cocina</button>
    <button class="nav-btn"        id="btn-admin"    onclick="loadView('admin')">🔐 Admin</button>
    <div class="spacer"></div>
    <button class="fs-btn" id="btn-fs" onclick="toggleFullscreen()" title="Pantalla completa (F11)">⛶</button>
    <div class="lan-pill" id="lan-pill" title="URL para acceso en red local — toca para copiar">
      <div class="lan-dot"></div>
      <span class="lan-txt" id="lan-txt">red local</span>
    </div>
    <div class="upd-pill" id="upd-pill" onclick="reqUpdate()">
      <div class="upd-dot"></div>
      <span class="upd-txt" id="upd-txt">Actualización disponible</span>
    </div>
  </div>
  <div id="app-viewport">
    <iframe id="view-vendedor" class="view-frame active" src="/vendedor"></iframe>
    <iframe id="view-cocina"   class="view-frame"        src="about:blank"></iframe>
    <iframe id="view-admin"    class="view-frame"        src="about:blank"></iframe>
  </div>
</div>
<script>
// ── Estado global compartido (accesible desde vistas via window.parent.DrunksState) ──
window.DrunksState = {
  cart:      {},
  userRole:  null,
  lastRoute: 'vendedor',
};

// ── Router ──────────────────────────────────────────────────────────────────────
var _cur = 'vendedor';
var _loaded = new Set(['vendedor']);

async function loadView(name) {
  if (_cur === name) return;

  var prevFrame = document.getElementById('view-' + _cur);
  var nextFrame = document.getElementById('view-' + name);

  // Lazy load: la primera vez que se visita la vista, asignar src y esperar
  if (!_loaded.has(name)) {
    _loaded.add(name);
    await new Promise(function(resolve) {
      nextFrame.addEventListener('load', resolve, { once: true });
      nextFrame.src = '/' + name;
    });
  }

  // Actualizar botones de navegación
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + name);
  if (btn) btn.classList.add('active');

  // Animación: salida del iframe actual, entrada del siguiente
  prevFrame.classList.remove('active');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      nextFrame.classList.add('active');
      _cur = name;
      window.DrunksState.lastRoute = name;
      try { nextFrame.contentWindow.dispatchEvent(new CustomEvent('viewMounted')); } catch(_) {}
    });
  });
}

// ── Badge LAN ───────────────────────────────────────────────────────────────────
fetch('/api/sync/info').then(function(r) { return r.json(); }).then(function(d) {
  if (d.local_ip && d.local_ip !== '127.0.0.1') {
    var url  = 'http://' + d.local_ip + ':' + d.port;
    var pill = document.getElementById('lan-pill');
    var txt  = document.getElementById('lan-txt');
    txt.textContent = url;
    pill.style.display = 'flex';
    pill.onclick = function() { navigator.clipboard && navigator.clipboard.writeText(url); };
  }
}).catch(function() {});

// ── Actualización ───────────────────────────────────────────────────────────────
function showUpdate(ver) {
  document.getElementById('upd-txt').textContent = 'v' + ver + ' disponible';
  document.getElementById('upd-pill').style.display = 'flex';
}
function reqUpdate() {
  if (window.pywebview && window.pywebview.api)
    window.pywebview.api.open_update_window();
}

// ── Pantalla completa ───────────────────────────────────────────────────────────
var _isFs = false;
function toggleFullscreen() {
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.toggle_fullscreen();
    _isFs = !_isFs;
    document.getElementById('btn-fs').textContent = _isFs ? '⊡' : '⛶';
  }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
});
</script>
</body>
</html>
