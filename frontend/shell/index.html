<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drunks POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;
  --surface:#0D1929;
  --border:#334155;
  --text:#F8FAFC;
  --muted:#64748B;
  --amber:#FF7A18;
  --amber-dim:rgba(255,122,24,.12);
  --amber-glow:rgba(255,122,24,.25);
  --green:#22C55E;
  --topbar-bg:rgba(2,6,23,.92);
  --topbar-border:rgba(255,255,255,.07);
  --nav-wrap-bg:rgba(255,255,255,.035);
  --nav-wrap-border:rgba(255,255,255,.07);
  --nav-hover-bg:rgba(255,255,255,.07);
  --fs-hover-bg:rgba(255,255,255,.06);
  --ease-out-quint:cubic-bezier(.23,1,.32,1);
  --ease-in-quint:cubic-bezier(.64,0,.78,0);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
html[data-theme=light]{
  --bg:#F8F9FB;
  --surface:#F0F4F8;
  --border:#E5E7EB;
  --text:#1F2937;
  --muted:#64748B;
  --amber:#FF6B35;
  --amber-dim:rgba(255,107,53,.12);
  --amber-glow:rgba(255,107,53,.2);
  --green:#22C55E;
  --topbar-bg:rgba(15,118,110,.96);
  --topbar-border:rgba(255,255,255,.15);
  --nav-wrap-bg:rgba(255,255,255,.15);
  --nav-wrap-border:rgba(255,255,255,.2);
  --nav-hover-bg:rgba(255,255,255,.2);
  --fs-hover-bg:rgba(255,255,255,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Space Grotesk',system-ui,sans-serif}

.shell{display:flex;flex-direction:column;height:100vh}

/* ── Topbar ── */
.topbar{
  background:var(--topbar-bg);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-bottom:1px solid var(--topbar-border);
  height:56px;display:flex;align-items:center;padding:0 16px;gap:2px;
  flex-shrink:0;user-select:none;-webkit-user-select:none;
  position:relative;z-index:50;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,122,24,.18),transparent);
  pointer-events:none;
}

/* ── Logo ── */
.logo{
  font-size:.9rem;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:9px;margin-right:14px;
  letter-spacing:-.02em;white-space:nowrap;
}
.logo-mark{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(145deg,#FF8A38,#FF7A18);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(255,122,24,.35),0 0 18px rgba(255,122,24,.25),0 2px 8px rgba(0,0,0,.4);
}
.logo-mark svg{width:15px;height:15px;fill:#0B1120}
.logo-name{color:var(--text);font-weight:800;letter-spacing:-.03em}
.logo-tag{color:var(--muted);font-weight:400;font-size:.72rem;margin-left:2px}

/* ── Divider ── */
.topbar-div{width:1px;height:22px;background:var(--border);margin:0 8px;flex-shrink:0}

/* ── Nav ── */
.nav-wrap{display:flex;align-items:center;gap:1px;background:var(--nav-wrap-bg);border:1px solid var(--nav-wrap-border);border-radius:11px;padding:3px}

.nav-btn{
  font-family:'Space Grotesk',system-ui,sans-serif;
  font-size:.78rem;font-weight:600;letter-spacing:-.01em;
  color:var(--muted);background:transparent;border:none;
  border-radius:8px;padding:5px 12px;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:color 200ms var(--ease-out-quint),background 200ms var(--ease-out-quint),box-shadow 200ms;
  position:relative;
}
.nav-btn svg{width:14px;height:14px;flex-shrink:0;transition:opacity 200ms}
.nav-btn:hover{color:var(--text);background:var(--nav-hover-bg)}
.nav-btn:active{transform:scale(.95)}
.nav-btn.active{
  color:#0B1120;
  background:linear-gradient(145deg,#FF8A38,#FF7A18);
  box-shadow:0 1px 8px rgba(255,122,24,.4),0 0 0 1px rgba(255,122,24,.2) inset;
}
.nav-btn.active svg{opacity:1}

/* ── Spacer ── */
.spacer{flex:1}

/* ── Pills ── */
@keyframes pillIn{from{opacity:0;transform:scale(.85) translateX(6px)}to{opacity:1;transform:scale(1) translateX(0)}}

.lan-pill{
  display:none;align-items:center;gap:6px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:99px;
  padding:4px 12px 4px 8px;cursor:pointer;
  animation:pillIn .35s var(--spring) both;
  transition:background 150ms,transform 100ms;
}
.lan-pill:hover{background:rgba(34,197,94,.15);transform:scale(1.02)}
.lan-dot{width:6px;height:6px;background:var(--green);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(34,197,94,.6)}
.lan-txt{font-size:.68rem;font-weight:600;color:#86EFAC;font-family:'Space Grotesk',monospace;letter-spacing:.01em}
html[data-theme=light] .lan-txt{color:#166534}

@keyframes updPulse{0%,100%{box-shadow:0 0 0 0 var(--amber-glow)}60%{box-shadow:0 0 0 5px rgba(255,122,24,0)}}
.upd-pill{
  display:none;align-items:center;gap:7px;
  background:var(--amber-dim);border:1px solid rgba(255,122,24,.35);border-radius:99px;
  padding:4px 12px 4px 8px;cursor:pointer;
  animation:pillIn .35s var(--spring) both, updPulse 2.5s 1s infinite;
  transition:background 150ms,transform 100ms;
}
.upd-pill:hover{background:rgba(245,158,11,.2);transform:scale(1.03)}
.upd-pill:active{transform:scale(.97)}
.upd-dot{width:7px;height:7px;background:var(--amber);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px var(--amber-glow)}
.upd-txt{font-size:.73rem;font-weight:600;color:#FCD34D}

/* ── Fullscreen btn ── */
.fs-btn{
  width:32px;height:32px;background:transparent;border:1px solid var(--border);
  border-radius:8px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:color 150ms,background 150ms,border-color 150ms,transform 100ms;
  margin-left:6px;
}
.fs-btn:hover{background:var(--fs-hover-bg);color:var(--text);border-color:var(--border)}
.fs-btn:active{transform:scale(.92)}
.fs-btn svg{width:14px;height:14px}

/* ── Viewport + frames ── */
#app-viewport{position:relative;flex:1;overflow:hidden}
.view-frame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;opacity:0;transform:scale(.982) translateY(5px);
  transition:opacity .22s var(--ease-out-quint),transform .22s var(--ease-out-quint);
  pointer-events:none;will-change:opacity,transform;
}
.view-frame.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
.view-frame.exiting{
  opacity:0;transform:scale(.982) translateY(-5px);
  transition:opacity .16s var(--ease-in-quint),transform .16s var(--ease-in-quint);
}

@media(prefers-reduced-motion:reduce){
  .nav-btn,.fs-btn,.lan-pill,.upd-pill,.view-frame{transition:opacity 150ms linear!important;transform:none!important}
  .upd-pill{animation:none!important}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M5 3h12v2H5V3zm0 4h12l-1.5 9H6.5L5 7zm3 2v5h1V9H8zm3 0v5h1V9h-1zm3 0v5h1V9h-1z"/></svg>
      </div>
      <span class="logo-name">Drunks</span><span class="logo-tag">POS</span>
    </div>

    <div class="topbar-div"></div>

    <div class="nav-wrap">
      <button class="nav-btn active" id="btn-vendedor" onclick="loadView('vendedor')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4V2H5v2H3a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-2V2h-2v2H7zm0 2h10v1H7V6zM4 8h16v10H4V8zm4 2v2h2v-2H8zm4 0v2h2v-2h-2zm4 0v2h2v-2h-2zm-8 4v2h2v-2H8zm4 0v2h2v-2h-2z"/></svg>
        Vendedor
      </button>
      <button class="nav-btn" id="btn-cocina" onclick="loadView('cocina')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2.01 20 2v2h-2V2.01zM13 2H9v2h4V2zm6 4h-2v1c0 2.76-2.24 5-5 5s-5-2.24-5-5V6H5v1c0 3.53 2.61 6.43 6 6.92V22h2v-8.08c3.39-.49 6-3.39 6-6.92V6z"/></svg>
        Cocina
      </button>
      <button class="nav-btn" id="btn-entrega" onclick="loadView('entrega')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9 1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        Entrega
      </button>
      <button class="nav-btn" id="btn-admin" onclick="loadView('admin')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4 5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
        Admin
      </button>
    </div>

    <div class="spacer"></div>

    <div class="lan-pill" id="lan-pill" title="URL red local — clic para copiar">
      <div class="lan-dot"></div>
      <span class="lan-txt" id="lan-txt">red local</span>
    </div>

    <div class="upd-pill" id="upd-pill" onclick="reqUpdate()">
      <div class="upd-dot"></div>
      <span class="upd-txt" id="upd-txt">Actualización disponible</span>
    </div>

    <button class="fs-btn" id="btn-fs" onclick="toggleFullscreen()" title="Pantalla completa (F11)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

  </div>

  <div id="app-viewport">
    <iframe id="view-vendedor" class="view-frame active" src="/vendedor"></iframe>
    <iframe id="view-cocina"   class="view-frame"        src="about:blank"></iframe>
    <iframe id="view-entrega"  class="view-frame"        src="about:blank"></iframe>
    <iframe id="view-admin"    class="view-frame"        src="about:blank"></iframe>
  </div>
</div>

<script>
window.DrunksState = { cart:{}, userRole:null, lastRoute:'vendedor' };
var _cur = 'vendedor';
var _loaded = new Set(['vendedor']);

async function loadView(name) {
  if (_cur === name) return;
  var prevFrame = document.getElementById('view-' + _cur);
  var nextFrame = document.getElementById('view-' + name);
  if (!_loaded.has(name)) {
    _loaded.add(name);
    await new Promise(function(resolve) {
      nextFrame.addEventListener('load', resolve, { once: true });
      nextFrame.src = '/' + name;
    });
  }
  prevFrame.classList.add('exiting');
  var _p = prevFrame;
  setTimeout(function() { _p.classList.remove('active','exiting'); }, 160);
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + name);
  if (btn) btn.classList.add('active');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      nextFrame.classList.add('active');
      _cur = name;
      window.DrunksState.lastRoute = name;
      try { nextFrame.contentWindow.dispatchEvent(new CustomEvent('viewMounted')); } catch(_) {}
    });
  });
}

fetch('/api/sync/info').then(function(r){return r.json();}).then(function(d){
  if (d.local_ip && d.local_ip !== '127.0.0.1') {
    var url = 'http://' + d.local_ip + ':' + d.port;
    var pill = document.getElementById('lan-pill');
    document.getElementById('lan-txt').textContent = url;
    pill.style.display = 'flex';
    pill.onclick = function(){ navigator.clipboard && navigator.clipboard.writeText(url); };
  }
}).catch(function(){});

function showUpdate(ver) {
  document.getElementById('upd-txt').textContent = 'v' + ver + ' disponible';
  document.getElementById('upd-pill').style.display = 'flex';
}
function reqUpdate() {
  if (window.pywebview && window.pywebview.api) window.pywebview.api.open_update_window();
}

var _isFs = false;
function toggleFullscreen() {
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.toggle_fullscreen();
    _isFs = !_isFs;
    var icon = _isFs
      ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
      : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
    document.getElementById('btn-fs').querySelector('svg').innerHTML = icon;
  }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
});
</script>
</body>
</html>
