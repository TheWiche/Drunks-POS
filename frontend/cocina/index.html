<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* ── Easing tokens Emil Kowalski ── */
  :root{--ease-out-quint:cubic-bezier(.23,1,.32,1);--ease-in-quint:cubic-bezier(.64,0,.78,0);--spring:cubic-bezier(.34,1.56,.64,1)}

  body{background:#020617;font-family:'Segoe UI',system-ui,sans-serif}

  /* ── Animaciones core (easing mejorado) ── */
  @keyframes heroIn{from{transform:translateY(-24px) scale(.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  .hero-in{animation:heroIn .38s var(--ease-out-quint) both}
  @keyframes promoteHero{0%{transform:translateY(60px) scale(.8);opacity:0}60%{transform:translateY(-4px) scale(1.01);opacity:1}100%{transform:none;opacity:1}}
  .promote-hero{animation:promoteHero .46s var(--ease-out-quint) both}
  @keyframes cardIn{from{transform:translateY(-16px) scale(.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  .card-in{animation:cardIn .3s var(--ease-out-quint) both}
  @keyframes queueIn{from{transform:translateX(16px) scale(.96);opacity:0}to{transform:none;opacity:1}}
  .queue-in{animation:queueIn .24s var(--ease-out-quint) both}
  #queueGrid>.queue-in:nth-child(2){animation-delay:.04s}
  #queueGrid>.queue-in:nth-child(3){animation-delay:.08s}
  #queueGrid>.queue-in:nth-child(4){animation-delay:.12s}
  #queueGrid>.queue-in:nth-child(5){animation-delay:.16s}
  #queueGrid>.queue-in:nth-child(n+6){animation-delay:.20s}
  @keyframes completeFlash{0%{box-shadow:none}35%{box-shadow:0 0 0 16px rgba(74,222,128,.28),0 0 50px rgba(74,222,128,.18),inset 0 0 24px rgba(74,222,128,.06)}80%{box-shadow:0 0 0 4px rgba(74,222,128,.1)}100%{box-shadow:none;opacity:.75}}
  .completing-flash{animation:completeFlash .3s ease-out both;pointer-events:none}
  @keyframes completeExit{0%{transform:scale(1) translateY(0);opacity:1}10%{transform:scale(1.02) translateY(-3px)}100%{transform:scale(.88) translateY(-32px);opacity:0;max-height:0;padding:0;margin:0;overflow:hidden}}
  .completing-exit{animation:completeExit .36s var(--ease-in-quint) both;overflow:hidden}
  @keyframes stationDone{0%{transform:scale(1);opacity:1}12%{transform:scale(1.02)}100%{transform:translateY(-20px) scale(.9);opacity:0}}
  .station-done{animation:stationDone .3s var(--ease-in-quint) both}
  @keyframes stationPromote{0%{transform:translateY(28px) scale(.9);opacity:0}65%{transform:translateY(-3px) scale(1.01)}100%{transform:none;opacity:1}}
  .station-promote{animation:stationPromote .36s var(--ease-out-quint) both}
  @keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}60%{box-shadow:0 0 0 8px rgba(74,222,128,0)}}
  .pulse-green{animation:pulseGreen 2s infinite}
  @keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .priority-badge{animation:badgePulse 2.5s ease infinite}
  @keyframes activeCardIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .active-card-in{animation:activeCardIn .3s var(--ease-out-quint)}

  /* ── Timer semáforo (solo transform+opacity) ── */
  @keyframes urgentBorderPulse{0%,100%{opacity:.45}50%{opacity:1}}
  .timer-urgent{animation:urgentBorderPulse 1.4s ease infinite!important;border-color:rgba(239,68,68,.6)!important}
  .timer-urgent-card{border-color:rgba(239,68,68,.5)!important}

  /* ── Clases temáticas con CSS vars ── */
  .hero-glow{box-shadow:0 20px 52px var(--acc-glow,rgba(147,51,234,.4)),0 0 0 2px var(--acc-border,rgba(147,51,234,.35))}
  .view-btn.active{background:var(--acc-muted,rgba(147,51,234,.18));color:var(--acc-light,#c4b5fd);box-shadow:0 0 14px var(--acc-glow,rgba(147,51,234,.45))}
  .tab-active{border-bottom-color:var(--acc-hex,#9333ea)!important;color:var(--acc-light,#c4b5fd)!important}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--acc-hex,#374151);border-radius:4px;opacity:.6}

  /* ── Fijos ── */
  .queue-mini-card{min-width:148px;max-width:172px;flex-shrink:0}
  .station-col{display:flex;flex-direction:column;border-right:1px solid rgba(31,41,55,.6);min-width:300px;flex:1;height:100%}
  input:focus,select:focus{outline:none}
  .view-btn{color:#4b5563;transition:color 150ms var(--ease-out-quint),background 150ms var(--ease-out-quint),transform 100ms ease-out;width:2.25rem;height:2.25rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .view-btn:not(.active):hover{background:rgba(255,255,255,.06);color:#d1d5db}
  .view-btn:active{transform:scale(.9)}

  /* ── Timer bar mejorada ── */
  .timer-bar-track{height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:7px}
  .timer-fill{height:100%;border-radius:3px;transition:width .6s var(--ease-out-quint),background-color .6s ease}

  /* ── Ripple en botón preparar ── */
  .btn-preparar{position:relative;overflow:hidden;cursor:pointer}
  .btn-preparar::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.06);transform:scale(0);opacity:0;border-radius:inherit;transition:transform .4s var(--ease-out-quint),opacity .4s ease}
  .btn-preparar:active::after{transform:scale(1);opacity:1;transition:none}

  /* ── Reduced motion ── */
  @media(prefers-reduced-motion:reduce){
    .hero-in,.promote-hero,.card-in,.queue-in,.completing-exit,.station-done,.station-promote,.active-card-in{animation:none!important;opacity:1!important;transform:none!important}
    .timer-urgent,.pulse-green,.priority-badge{animation:none!important}
  }
</style>
</head>

<script>
// ─── TIMER SEMÁFORO ───
function _getTimerInfo(fecha) {
  const min = (Date.now() - new Date(fecha || Date.now()).getTime()) / 60000;
  if (min < 3) return {
    fill: 'bg-emerald-500',
    fillSt: 'background:#10b981;box-shadow:0 0 8px rgba(16,185,129,.5)',
    width: '100%',
    label: Math.floor(min) + 'm',
    labelCls: 'text-emerald-400',
    urgent: false
  };
  if (min < 5) return {
    fill: 'bg-yellow-400',
    fillSt: 'background:#facc15;box-shadow:0 0 10px rgba(250,204,21,.6)',
    width: '60%',
    label: Math.floor(min) + 'm',
    labelCls: 'text-yellow-400',
    urgent: false
  };
  return {
    fill: 'bg-red-500',
    fillSt: 'background:#ef4444;box-shadow:0 0 14px rgba(239,68,68,.8)',
    width: '28%',
    label: Math.floor(min) + 'm ⚠',
    labelCls: 'text-red-400 font-black',
    urgent: true
  };
}

function _timerBarHTML(fecha) {
  const t = _getTimerInfo(fecha);
  return `<div class="px-4 pt-2.5 pb-0">
    <div class="flex items-center justify-between mb-1">
      <span class="text-[9px] font-bold tracking-widest text-gray-700">TIEMPO</span>
      <span class="text-[10px] font-bold ${t.labelCls}">${t.label}</span>
    </div>
    <div class="w-full h-1 rounded-full overflow-hidden" style="background:rgba(255,255,255,.06)">
      <div class="timer-fill h-full rounded-full transition-all duration-1000" style="${t.fillSt};width:${t.width}"></div>
    </div>
  </div>`;
}

function updateTimers() {
  document.querySelectorAll('[data-fecha]').forEach(el => {
    const t = _getTimerInfo(el.dataset.fecha);
    const fill = el.querySelector('.timer-fill');
    if (fill) {
      fill.style.cssText = t.fillSt + ';width:' + t.width + ';transition:all 1s ease';
    }
    const lbl = el.querySelector('.timer-label');
    if (lbl) { lbl.textContent = t.label; lbl.className = 'timer-label text-[10px] font-bold ' + t.labelCls; }
    if (t.urgent) {
      el.classList.add('timer-urgent');
      el.classList.remove('timer-urgent-card');
    } else {
      el.classList.remove('timer-urgent', 'timer-urgent-card');
    }
  });
}
setInterval(updateTimers, 30000);

// ─── STATE ───
let ws = null, wsTimer = null;
let orders = {};
let _promoting = false;
let viewMode = localStorage.getItem('kitchenView') || 'priority';

// ─── WEBSOCKET ───
let _wsEverConnected = false;
function connectWS() {
  if (ws && ws.readyState < 2) return;
  const _wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(_wsProto + '//' + location.host + '/api/ws');
  ws.onopen = () => {
    document.getElementById('wsDot').className = 'w-2 h-2 rounded-full bg-emerald-500 shrink-0 pulse-green';
    document.getElementById('wsTxt').textContent = 'Conectado en vivo';
    document.getElementById('wsTxt').style.color = '#4ade80';
    if (wsTimer) { clearTimeout(wsTimer); wsTimer = null; }
    if (_wsEverConnected) loadPending();
    _wsEverConnected = true;
  };
  ws.onmessage = e => { try { const d = JSON.parse(e.data); if (d.type === 'new_order') addOrder(d.order); } catch(_){} };
  ws.onclose = ws.onerror = () => {
    document.getElementById('wsDot').className = 'w-2 h-2 rounded-full bg-red-500 shrink-0';
    document.getElementById('wsTxt').textContent = 'Reconectando...';
    document.getElementById('wsTxt').style.color = '';
    wsTimer = setTimeout(connectWS, 3000);
  };
}

// ─── KITCHEN RENDER ───
function addOrder(order) {
  if (orders[order.id]) return;
  orders[order.id] = order;

  const empty = document.getElementById('emptyState');
  if (empty) empty.classList.add('hidden');

  if (stationCfg.count >= 2) {
    _addOrderMultiStation(order);
  } else {
    _addOrderSingleStation(order);
  }
  updateCount(Object.keys(orders).length);
}

function _addOrderMultiStation(order) {
  const allOrders = Object.values(orders).sort((a,b) => a.id - b.id);
  const activeIdsBefore = new Set(Object.values(stationActive).map(Number));
  autoAssignFreeStations(allOrders);
  const activeIdsAfter = new Set(Object.values(stationActive).map(Number));

  if (activeIdsAfter.has(order.id) && !activeIdsBefore.has(order.id)) {
    const si = parseInt(Object.keys(stationActive).find(k => Number(stationActive[k]) === order.id));
    if (!isNaN(si)) { _updateSingleStation(si); return; }
  }

  const strip = document.querySelector('[data-queue-strip]');
  if (!strip) { renderKitchen(); return; }

  const emptyMsg = strip.querySelector('p.text-gray-700');
  if (emptyMsg) {
    const activeIds2 = new Set(Object.values(stationActive).map(Number));
    const queueOrders = allOrders.filter(o => !activeIds2.has(o.id));
    strip.replaceWith(renderSharedQueueStrip(queueOrders)); return;
  }

  const row = strip.querySelector('.flex.gap-2.overflow-x-auto');
  if (!row) { renderKitchen(); return; }
  const activeIds2 = new Set(Object.values(stationActive).map(Number));
  const queueOrders = allOrders.filter(o => !activeIds2.has(o.id));
  const position = queueOrders.findIndex(o => o.id === order.id);
  const card = buildQueueMiniCard(order, position);
  card.style.animation = 'queueIn .3s cubic-bezier(.175,.885,.32,1.275) both';
  row.appendChild(card);
  const label = strip.querySelector('.text-gray-500');
  if (label) label.textContent = `En cola (${queueOrders.length})`;
}

function _addOrderSingleStation(order) {
  const allOrders = Object.values(orders).sort((a,b) => a.id - b.id);

  if (allOrders.length === 1) { renderKitchen(); return; }
  if (viewMode === 'duo' && allOrders.length === 2) { renderKitchen(); return; }

  const qGrid = document.getElementById('queueGrid');
  if (!qGrid) { renderKitchen(); return; }

  let card;
  if (viewMode === 'compact') {
    card = buildCompactCard(order);
    card.className = card.className.replace('card-in', 'queue-in');
  } else {
    card = buildQueueCard(order);
    card.className = card.className.replace('card-in', 'queue-in');
  }
  qGrid.appendChild(card);

  if (viewMode === 'priority' || viewMode === 'duo') {
    const n = qGrid.children.length;
    document.getElementById('queueTitle').textContent = 'EN FILA — ' + n + ' pedido' + (n !== 1 ? 's' : '');
    document.getElementById('queueLabel')?.classList.remove('hidden');
  }
}

function renderKitchen() {
  if (stationCfg.count >= 2) { renderMultiStation(); return; }

  const list    = Object.values(orders).sort((a, b) => a.id - b.id);
  const heroSec = document.getElementById('heroSection');
  const qLabel  = document.getElementById('queueLabel');
  const qTitle  = document.getElementById('queueTitle');
  const qGrid   = document.getElementById('queueGrid');
  const empty   = document.getElementById('emptyState');

  updateCount(list.length);

  if (!list.length) {
    heroSec.innerHTML = ''; qGrid.innerHTML = '';
    qLabel.classList.add('hidden');
    document.getElementById('singleView').classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }
  document.getElementById('singleView').classList.remove('hidden');
  empty.classList.add('hidden');

  const hide = () => { qLabel.classList.add('hidden'); };
  const showLabel = (n) => {
    qLabel.classList.remove('hidden');
    qTitle.textContent = 'EN FILA — ' + n + ' pedido' + (n !== 1 ? 's' : '');
  };

  if (viewMode === 'priority') {
    heroSec.innerHTML = '';
    heroSec.appendChild(buildHeroCard(list[0]));
    qGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3';
    qGrid.innerHTML = '';
    if (list.length > 1) {
      showLabel(list.length - 1);
      list.slice(1).forEach(o => qGrid.appendChild(buildQueueCard(o)));
    } else { hide(); }

  } else if (viewMode === 'duo') {
    heroSec.innerHTML = '';
    if (list.length === 1) {
      heroSec.appendChild(buildHeroCard(list[0]));
      hide(); qGrid.innerHTML = '';
    } else {
      const duoWrap = document.createElement('div');
      duoWrap.className = 'grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4';
      duoWrap.appendChild(buildMediumCard(list[0], 1));
      duoWrap.appendChild(buildMediumCard(list[1], 2));
      heroSec.appendChild(duoWrap);
      qGrid.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2';
      qGrid.innerHTML = '';
      if (list.length > 2) {
        showLabel(list.length - 2);
        list.slice(2).forEach(o => qGrid.appendChild(buildQueueCard(o)));
      } else { hide(); }
    }

  } else if (viewMode === 'grid') {
    heroSec.innerHTML = ''; hide();
    qGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3';
    qGrid.innerHTML = '';
    list.forEach(o => qGrid.appendChild(buildQueueCard(o)));

  } else if (viewMode === 'compact') {
    heroSec.innerHTML = ''; hide();
    qGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-2';
    qGrid.innerHTML = '';
    list.forEach(o => qGrid.appendChild(buildCompactCard(o)));
  }
}

function hexToRgb(hex) {
  const h = (hex||'#8b5cf6').replace('#','');
  const n = parseInt(h.length===3?h.split('').map(x=>x+x).join(''):h,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}

function buildItemRow(it, big) {
  const parts = (it.observaciones||'').split(' | ');
  const isBase = s => s && /^[^:]+: /.test(s);
  const base  = isBase(parts[0]) ? parts[0] : null;
  const notas = base ? parts.slice(1).join(' | ') : (it.observaciones||'');
  const [r,g,b] = hexToRgb(it.categoria_color||'#8b5cf6');
  const badgeSt = `background:rgba(${r},${g},${b},0.85)`;
  return `<div class="flex items-start gap-3 py-${big?3:2} border-b last:border-0" style="border-color:rgba(255,255,255,.06)">
    <span class="${big?'text-sm':'text-xs'} font-extrabold px-2.5 py-0.5 rounded-lg shrink-0 mt-0.5 text-white" style="${badgeSt}">${it.cantidad}x</span>
    <div class="flex-1">
      <div class="text-white font-bold ${big?'text-lg':'text-sm'}">${it.nombre}</div>
      ${base  ? '<div class="text-amber-400 font-bold text-xs mt-0.5">📌 ' + base + '</div>' : ''}
      ${notas ? '<div class="text-yellow-300 font-extrabold text-' + (big?'sm':'xs') + ' mt-0.5">⚠ ' + notas + '</div>' : ''}
    </div>
  </div>`;
}

function buildHeroCard(o) {
  const div = document.createElement('div');
  div.id = 'order-' + o.id;
  div.dataset.fecha = o.fecha || new Date().toISOString();
  div.className = _promoting ? 'promote-hero' : 'hero-in';
  const timerInfo = _getTimerInfo(o.fecha);
  if (timerInfo.urgent) div.classList.add('timer-urgent');

  const efect = o.metodo_pago === 'Efectivo';
  const hBg   = efect ? 'from-emerald-700/80 to-emerald-900/80' : 'from-blue-700/80 to-blue-900/80';
  const icon  = efect ? '💵' : '📱';
  const tStr  = new Date(o.fecha||Date.now()).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  const rows  = (o.items||[]).map(it => buildItemRow(it, true)).join('');
  div.innerHTML = `
    <div class="flex items-center gap-3 mb-3">
      <div class="priority-badge bg-red-500 text-white text-xs font-extrabold px-3 py-1 rounded-full tracking-wider" style="box-shadow:0 0 14px rgba(239,68,68,.5)">#1 PRIORIDAD</div>
      <div class="h-px flex-1" style="background:rgba(255,255,255,.07)"></div>
    </div>
    <div class="border-2 rounded-3xl overflow-hidden hero-glow" style="background:rgba(10,8,22,.75);backdrop-filter:blur(20px)">
      ${_timerBarHTML(o.fecha)}
      <div class="bg-gradient-to-r ${hBg} px-6 py-5 flex items-start justify-between mt-2">
        <div>
          <div class="flex items-center gap-2 mb-2">
            <span class="text-white/40 text-[10px] font-extrabold px-2 py-0.5 rounded-full tracking-wider border border-white/15">${o.numero_factura||('#'+o.id)}</span>
            <span class="text-white/50 text-xs">${icon} ${o.metodo_pago} · ${tStr}</span>
          </div>
          <div class="text-white font-extrabold text-4xl leading-none tracking-tight">${o.cliente}</div>
        </div>
        <div class="text-white font-extrabold text-3xl tabular-nums leading-none opacity-90">$${Math.round(o.total).toLocaleString('es-CO')}</div>
      </div>
      <div class="px-6 py-4">${rows||'<div class="text-gray-700 text-sm text-center py-4">Sin detalle</div>'}</div>
      <div class="px-6 pb-6">
        <button data-id="${o.id}" onclick="completeOrder(parseInt(this.dataset.id))"
          class="btn-preparar w-full font-extrabold py-5 rounded-2xl text-xl transition-all duration-100 border"
          style="background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.45);color:#86efac;box-shadow:0 0 22px rgba(34,197,94,.18)">
          ✓ LISTO — MARCAR PREPARADO
        </button>
      </div>
    </div>`;
  return div;
}

function buildQueueCard(o) {
  const div = document.createElement('div');
  div.id = 'order-' + o.id;
  div.dataset.fecha = o.fecha || new Date().toISOString();
  const timerInfo = _getTimerInfo(o.fecha);
  div.className = (_promoting ? 'queue-in ' : 'card-in ') + 'border rounded-2xl overflow-hidden flex flex-col' + (timerInfo.urgent ? ' timer-urgent-card' : '');
  div.style.cssText = timerInfo.urgent
    ? 'background:rgba(10,8,22,.8);backdrop-filter:blur(16px);border-color:rgba(239,68,68,.4)'
    : 'background:rgba(10,8,22,.8);backdrop-filter:blur(16px);border-color:rgba(255,255,255,.08)';
  if (timerInfo.urgent) div.classList.add('timer-urgent');

  const efect = o.metodo_pago === 'Efectivo';
  const hBg   = efect ? 'from-emerald-800/55 to-emerald-900/55' : 'from-blue-800/55 to-blue-900/55';
  const icon  = efect ? '💵' : '📱';
  const tStr  = new Date(o.fecha||Date.now()).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  const rows  = (o.items||[]).map(it => buildItemRow(it, false)).join('');
  div.innerHTML = `
    ${_timerBarHTML(o.fecha)}
    <div class="bg-gradient-to-r ${hBg} px-4 py-3 flex justify-between items-start mt-1">
      <div>
        <div class="text-white font-extrabold text-xl leading-tight">${o.cliente}</div>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="text-white/30 text-[9px] font-bold px-1.5 py-0.5 rounded-full border border-white/10">${o.numero_factura||('#'+o.id)}</span>
          <span class="text-white/40 text-xs">${icon} ${o.metodo_pago} · ${tStr}</span>
        </div>
      </div>
      <div class="text-white font-extrabold text-lg tabular-nums opacity-80">$${Math.round(o.total).toLocaleString('es-CO')}</div>
    </div>
    <div class="flex-1 px-4 py-3">${rows||'<div class="text-gray-700 text-xs text-center py-3">Sin detalle</div>'}</div>
    <div class="px-4 pb-4">

async function completeOrder(id) {
  const card = document.getElementById('order-' + id);
  if (!card) return;
  card.classList.add('completing-flash'); card.style.pointerEvents = 'none';
  fetch('/api/pedidos/' + id + '/preparar', { method: 'PUT' }).catch(() => {});
  const heroSec = document.getElementById('heroSection');
  const isHero = !!(heroSec && card && heroSec.contains(card));
  const remaining = Object.values(orders).filter(o => o.id !== id).length;
  _promoting = isHero && remaining > 0;
  if (card) { card.classList.remove('completing-flash'); card.classList.add('completing-exit'); }
  if (_promoting) setTimeout(() => { _promoting = false; }, 700);
  setTimeout(() => { delete orders[id]; renderKitchen(); }, 430);
}

function updateCount(n) {
  if (n === undefined) n = Object.keys(orders).length;
  document.getElementById('orderCount').textContent = n;
}

async function loadPending() {
  try {
    const r    = await fetch('/api/pedidos/pendientes');
    const list = await r.json();
    const beforeIds = new Set(Object.keys(orders).map(Number));
    const afterIds  = new Set(list.map(o => o.id));
    list.forEach(o => { orders[o.id] = o; });
    for (const id of beforeIds) { if (!afterIds.has(id)) delete orders[id]; }
    const changed = list.some(o => !beforeIds.has(o.id)) || [...beforeIds].some(id => !afterIds.has(id));
    if (changed) renderKitchen();
  } catch(e) {}
}

// ─── SETTINGS ───
function saveSetting(key, value) {
  localStorage.setItem(key, value);
  fetch('/api/settings/'+key, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({value})
  }).catch(()=>{});
}
async function loadSettings() {
  try {
    const s = await fetch('/api/settings').then(r=>r.json());
    if (s.palette || s.drunksPalette) applyTheme(s.palette || s.drunksPalette);
    if (s.kitchen_view) { viewMode = s.kitchen_view; localStorage.setItem('kitchenView', s.kitchen_view); }
    if (s.station_cfg)  { try { stationCfg   = JSON.parse(s.station_cfg); } catch(e){} }
    if (s.station_active){ try { stationActive= JSON.parse(s.station_active); } catch(e){} }
    Object.entries(s).forEach(([k,v]) => localStorage.setItem(k, v));
  } catch(e) {
    applyTheme(localStorage.getItem('drunksPalette') || 'dark');
  }
}

// ─── THEME SYSTEM ───
function applyTheme(t) {
  const theme = t||'dark';
  if (theme.startsWith('custom:')) { applyCustomTheme(theme.split(':')[1]); return; }
  document.documentElement.setAttribute('data-theme', theme);
  saveSetting('drunksPalette', theme);
  saveSetting('palette', theme);
  document.querySelectorAll('.theme-opt[data-theme]').forEach(b => {
    const on = b.dataset.theme === theme;
    b.style.background = on ? 'rgba(147,51,234,.2)' : '';
    b.style.outline    = on ? '1px solid rgba(147,51,234,.5)' : '';
  });
  const picker = document.getElementById('customColorPicker');
  if (picker) picker.style.display = 'none';
}
function applyCustomTheme(hex) {
  let style = document.getElementById('custom-theme-style');
  if (!style) { style = document.createElement('style'); style.id='custom-theme-style'; document.head.appendChild(style); }
  const h = hex||'#9333ea';
  const ri = parseInt(h.slice(1,3),16), gi = parseInt(h.slice(3,5),16), bi = parseInt(h.slice(5,7),16);
  style.textContent = `
    html[data-theme="custom"] body{background:#06060f}
    html[data-theme="custom"] .bg-purple-600,.bg-purple-700{background-color:${h}!important}
    html[data-theme="custom"] .text-purple-400,.text-purple-300{color:${h}!important}
    html[data-theme="custom"] .border-purple-500{border-color:${h}!important}
    html[data-theme="custom"] .from-purple-600{--tw-gradient-from:${h}!important}`;
  document.documentElement.setAttribute('data-theme','custom');
  saveSetting('drunksPalette','custom:'+h); saveSetting('palette','custom:'+h);
  document.querySelectorAll('.theme-opt[data-theme]').forEach(b=>{b.style.background='';b.style.outline='';});
  const picker = document.getElementById('customColorPicker');
  if (picker) { picker.style.display='inline-block'; picker.value=h; }
}
function toggleThemePicker() {
  document.getElementById('themePicker').classList.toggle('hidden');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#themePicker') && !e.target.closest('[onclick*="toggleThemePicker"]'))
    document.getElementById('themePicker')?.classList.add('hidden');
});

// ─── ESTADO SUPABASE ───
async function checkSupabase() {
  const dot = document.getElementById('sbDot');
  const txt = document.getElementById('sbTxt');
  try {
    const r = await fetch('/api/sync/status');
    const d = await r.json();
    if (!d.configured) {
      dot.className = 'w-2 h-2 rounded-full bg-gray-700 shrink-0';
      txt.textContent = 'Nube no configurada';
      txt.style.color = '#374151';
    } else if (!d.reachable) {
      dot.className = 'w-2 h-2 rounded-full bg-red-500 shrink-0';
      txt.textContent = d.pending > 0 ? `Sin nube · ${d.pending} sin subir` : 'Sin conexión a la nube';
      txt.style.color = '#f87171';
    } else if (d.pending > 0) {
      dot.className = 'w-2 h-2 rounded-full bg-yellow-400 shrink-0';
      txt.textContent = `Subiendo ${d.pending} pedido${d.pending !== 1 ? 's' : ''}...`;
      txt.style.color = '#fbbf24';
    } else {
      dot.className = 'w-2 h-2 rounded-full bg-emerald-500 shrink-0';
      txt.textContent = 'Nube sincronizada';
      txt.style.color = '#4ade80';
    }
  } catch(_) {}
}

  while (stationCfg.stations.length < n)

  }).join('');
}

function saveStationConfig() {
  document.querySelectorAll('.sname-inp').forEach(inp => {
    const si = parseInt(inp.dataset.si);
    if (stationCfg.stations[si]) stationCfg.stations[si].name = inp.value.trim() || ('Preparador '+(si+1));
  });
  document.querySelectorAll('.scat-chk').forEach(cb => {
    const si = parseInt(cb.dataset.si), catId = parseInt(cb.dataset.cat);
    if (!stationCfg.stations[si]) return;
    const ids = stationCfg.stations[si].catIds;
    if (cb.checked && !ids.includes(catId)) ids.push(catId);
    else if (!cb.checked) stationCfg.stations[si].catIds = ids.filter(id=>id!==catId);
  });
  saveSetting('stationCfg', JSON.stringify(stationCfg));
  saveSetting('station_cfg', JSON.stringify(stationCfg));
  toggleStationPanel();
  applyStationLayout();
}

function applyStationLayout() {
  const multi = stationCfg.count >= 2;
  const viewBar = document.getElementById('viewModeBar');
  if (viewBar) viewBar.style.display = multi ? 'none' : '';
  document.getElementById('singleView').classList.toggle('hidden', multi);
  document.getElementById('multiView').classList.toggle('hidden', !multi);
  renderKitchen();
}

function autoAssignFreeStations(allOrders) {
  Object.keys(stationActive).forEach(si => {
    if (!orders[Number(stationActive[si])]) delete stationActive[si];
  });
  const activeIds = new Set(Object.values(stationActive).map(Number));
  const queue = allOrders.filter(o => !activeIds.has(o.id));
  for (let si = 0; si < stationCfg.count; si++) {
    if (stationActive[String(si)] === undefined && queue.length) {
      const next = queue.shift();
      stationActive[String(si)] = next.id;
      activeIds.add(next.id);
    }
  }
  saveSetting('stationActive', JSON.stringify(stationActive));
  saveSetting('station_active', JSON.stringify(stationActive));
}

function saveStationName(si, value) {
  if (!stationCfg.stations[si]) return;
  stationCfg.stations[si].name = value.trim() || ('Preparador ' + (si + 1));
  saveSetting('stationCfg', JSON.stringify(stationCfg));
  saveSetting('station_cfg', JSON.stringify(stationCfg));
  const inp = document.querySelector('.sname-inp[data-si="'+si+'"]');
  if (inp) inp.value = stationCfg.stations[si].name;
}

      onkeydown="if(event.key==='Enter')this.blur()"
      title="Clic para editar nombre">`;
  panel.appendChild(hdr);

  if (activeOrder) {
    const catchAll = !cfg.catIds || cfg.catIds.length === 0;
    const items = (activeOrder.items||[]).filter(it =>
      catchAll || cfg.catIds.includes(it.categoria_id));
    const wrap = document.createElement('div');
    wrap.className = 'flex-1 overflow-hidden p-2';
    wrap.appendChild(buildActiveCard(activeOrder, items, si));
    panel.appendChild(wrap);
  } else {
    const empty = document.createElement('div');
    empty.className = 'flex flex-col items-center justify-center flex-1 text-gray-800 py-16';
    empty.innerHTML = '<div class="text-4xl mb-3 opacity-15">🍹</div><p class="text-xs text-gray-700">Libre</p>';
    panel.appendChild(empty);
  }

  return panel;
}

function renderSharedQueueStrip(queueOrders) {
  const strip = document.createElement('div');
  strip.className = 'border-t border-white/5 px-4 py-3 shrink-0';
  strip.style.cssText = 'background:rgba(6,6,15,.85);backdrop-filter:blur(16px)';
  strip.dataset.queueStrip = '1';
  if (!queueOrders.length) {
    strip.innerHTML = '<p class="text-gray-800 text-xs text-center py-0.5">Cola vacía — todos los pedidos están siendo preparados</p>';
    return strip;
  }
  const label = document.createElement('div');
  label.className = 'text-gray-700 text-[9px] font-black uppercase tracking-[.2em] mb-2';
  label.textContent = `En cola (${queueOrders.length})`;
  strip.appendChild(label);
  const row = document.createElement('div');
  row.className = 'flex gap-2 overflow-x-auto pb-1';
  row.style.scrollbarWidth = 'none';
  queueOrders.forEach((o, i) => row.appendChild(buildQueueMiniCard(o, i)));
  strip.appendChild(row);
  return strip;
}

function renderMultiStation() {
  const list = Object.values(orders).sort((a,b) => a.id - b.id);
  const container = document.getElementById('multiView');
  container.innerHTML = '';
  const empty = document.getElementById('emptyState');
  // Siempre renderizar los paneles de estaciones, vacíos o no
  empty.classList.add('hidden');

  autoAssignFreeStations(list);

  const activeIds = new Set(Object.values(stationActive).map(Number));
  const queueOrders = list.filter(o => !activeIds.has(o.id));

  const topRow = document.createElement('div');
  topRow.className = 'flex flex-1 min-h-0 overflow-hidden';
  for (let si = 0; si < stationCfg.count; si++) {
    const oid = stationActive[String(si)];
    const activeOrder = (oid !== undefined && orders[oid]) ? orders[oid] : null;
    topRow.appendChild(renderActivePanel(si, activeOrder));
  }
  container.appendChild(topRow);
  container.appendChild(renderSharedQueueStrip(queueOrders));
}

function _updateSingleStation(si) {
  const allOrders = Object.values(orders).sort((a,b) => a.id - b.id);
  autoAssignFreeStations(allOrders);
  const activeIds = new Set(Object.values(stationActive).map(Number));
  const queueOrders = allOrders.filter(o => !activeIds.has(o.id));

  const multiView = document.getElementById('multiView');
  if (!multiView) { renderKitchen(); return; }

  const panel = multiView.querySelector('[data-si="'+si+'"]');
  if (panel) {
    const oid = stationActive[String(si)];
    const activeOrder = (oid !== undefined && orders[oid]) ? orders[oid] : null;
    panel.replaceWith(renderActivePanel(si, activeOrder));
  }

  const strip = multiView.querySelector('[data-queue-strip]');
  if (strip) {
    strip.replaceWith(renderSharedQueueStrip(queueOrders));
  }

  updateCount(allOrders.length);
  const empty = document.getElementById('emptyState');
  if (empty) {
    if (allOrders.length === 0) empty.classList.remove('hidden');
    else empty.classList.add('hidden');
  }
}

async function completeStationOrder(orderId, si) {
  const order = orders[orderId];
  if (!order) return;

  const card = document.getElementById('active-order-' + orderId + '-' + si);
  if (card) { card.classList.add('completing-flash'); card.style.pointerEvents = 'none'; }
  fetch('/api/pedidos/' + orderId + '/entregar', { method: 'PUT' }).catch(() => {});
  delete stationActive[String(si)];
  saveSetting('stationActive', JSON.stringify(stationActive));
  saveSetting('station_active', JSON.stringify(stationActive));
  if (card) { card.classList.remove('completing-flash'); card.classList.add('station-done'); }
  setTimeout(() => {
    delete orders[orderId];
    if (stationCfg.count >= 2) _updateSingleStation(si);
    else renderKitchen();
  }, 390);
}

// ─── INIT ───
loadSettings().then(() => {
  // Marcar botón de vista activo desde el inicio
  document.querySelectorAll('.view-btn').forEach(b =>
    b.classList.toggle('active', b.id === 'vBtn-' + viewMode));
  applyStationLayout();
  loadPending();
  connectWS();
  checkSupabase();
  setInterval(checkSupabase, 30000);
  setInterval(loadPending, 5000);
});

// ── Auto-update ──
async function checkUpdate() {
  try {
    const d = await fetch('/api/update/check').then(r => r.json());
    if (d.has_update && d.latest) {
      document.getElementById('updateVersion').textContent = 'v'+d.current+' → v'+d.latest;
      document.getElementById('updateBanner').classList.remove('hidden');
    }
  } catch(e) {}
}
async function applyUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.textContent = 'Descargando...'; btn.disabled = true;
  try {
    await fetch('/api/update/apply', {method:'POST'});
    btn.textContent = 'Reiniciando...';
  } catch(e) { btn.textContent = 'Error — intenta de nuevo'; btn.disabled = false; }
}
checkUpdate();
setInterval(checkUpdate, 30 * 60 * 1000);
</script>

<!-- ═══ BANNER DE ACTUALIZACIÓN ═══ -->
<div id="updateBanner" class="hidden fixed bottom-0 left-0 right-0 z-[100] border-t border-purple-500/40 backdrop-blur-xl px-5 py-3 flex items-center justify-between gap-3 shadow-2xl" style="background:rgba(46,16,101,.92)">
  <div class="flex items-center gap-3">
    <span class="text-xl">🔄</span>
    <div>
      <div class="text-white font-bold text-sm">Nueva versión disponible</div>
      <div id="updateVersion" class="text-purple-300 text-xs font-mono"></div>
    </div>
  </div>
  <div class="flex gap-2 shrink-0">
    <button id="updateBtn" onclick="applyUpdate()"
      class="bg-purple-600 hover:bg-purple-500 active:bg-purple-700 text-white text-sm font-extrabold px-4 py-2 rounded-xl transition-colors"
      style="box-shadow:0 0 14px rgba(168,85,247,.4)">
      Actualizar ahora
    </button>
    <button onclick="document.getElementById('updateBanner').classList.add('hidden')"
      class="text-purple-400 hover:text-white text-sm px-3 py-2 rounded-xl transition-colors">
      Después
    </button>
  </div>
</div>

<!-- App Confirm Modal -->
<div id="appConfirmModal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-black/75 backdrop-blur-md">
  <div class="border border-white/8 rounded-2xl p-6 max-w-xs w-full mx-4 shadow-2xl" style="background:rgba(10,8,20,.96)">
    <p id="appConfirmMsg" class="text-white text-sm font-semibold leading-relaxed mb-5"></p>
    <div class="flex gap-3 justify-end">
      <button onclick="_appCR(false)" class="px-4 py-2 rounded-xl border border-white/8 text-gray-400 text-sm font-bold hover:bg-white/5 transition-colors">Cancelar</button>
      <button id="appConfirmOk" onclick="_appCR(true)" class="px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-500 transition-colors">Confirmar</button>
    </div>
  </div>
</div>
<script>
let _appCR = null;
function appConfirm(msg, okLabel = 'Confirmar') {
  return new Promise(r => {
    _appCR = v => { document.getElementById('appConfirmModal').classList.add('hidden'); _appCR = null; r(v); };
    document.getElementById('appConfirmMsg').textContent = msg;
    document.getElementById('appConfirmOk').textContent = okLabel;
    document.getElementById('appConfirmModal').classList.remove('hidden');
  });
}
</script>
