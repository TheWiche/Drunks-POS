<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;--surface:#0D1929;--card:#1E293B;--border:#334155;--border2:#475569;
  --text:#F8FAFC;--muted:#CBD5E1;--subtle:#64748B;
  --amber:#FF7A18;--amber-dim:rgba(255,122,24,.12);--amber-border:rgba(255,122,24,.28);--amber-glow:rgba(255,122,24,.22);
  --green:#22C55E;--green-dim:rgba(34,197,94,.10);--green-border:rgba(34,197,94,.28);
  --red:#F87171;--blue:#3B82F6;
  --interactive-bg:rgba(255,255,255,.04);
  --interactive-hover:rgba(255,255,255,.08);
  --interactive-active:rgba(255,255,255,.12);
  --interactive-border:rgba(255,255,255,.08);
  --divider:rgba(255,255,255,.06);
  --surface-raised:rgba(255,255,255,.02);
  --surface-card:rgba(255,255,255,.03);
  --overlay:rgba(0,0,0,.75);
  --scrollbar-thumb:rgba(255,255,255,.1);
  --green-text:#86EFAC;
  --blue-text:#93C5FD;
  --ease-out-quint:cubic-bezier(.23,1,.32,1);
  --ease-in-quint:cubic-bezier(.64,0,.78,0);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
html[data-theme=light]{
  --bg:#F8F9FB;--surface:#F0F4F8;--card:#FFFFFF;--border:#E5E7EB;--border2:#D1D5DB;
  --text:#1F2937;--muted:#64748B;--subtle:#94A3B8;
  --amber:#FF6B35;--amber-dim:rgba(255,107,53,.12);--amber-border:rgba(255,107,53,.28);--amber-glow:rgba(255,107,53,.22);
  --green:#22C55E;--green-dim:rgba(34,197,94,.10);--green-border:rgba(34,197,94,.28);
  --red:#EF4444;--blue:#3B82F6;
  --interactive-bg:rgba(0,0,0,.04);
  --interactive-hover:rgba(0,0,0,.07);
  --interactive-active:rgba(0,0,0,.11);
  --interactive-border:rgba(0,0,0,.08);
  --divider:rgba(0,0,0,.07);
  --surface-raised:rgba(0,0,0,.02);
  --surface-card:rgba(0,0,0,.03);
  --overlay:rgba(0,0,0,.55);
  --scrollbar-thumb:rgba(0,0,0,.15);
  --green-text:#15803D;
  --blue-text:#1D4ED8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:99px}

.header{
  height:52px;display:flex;align-items:center;padding:0 14px;gap:8px;
  background:var(--bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);position:relative;z-index:40;flex-shrink:0;
}
.logo-mark{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#2ECEB5,#1A9E8F);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(38,198,170,.25)}
.ws-pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;background:var(--interactive-bg);border:1px solid var(--border)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--subtle);flex-shrink:0;transition:background 300ms,box-shadow 300ms}
.ws-dot.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.6)}
.ws-dot.err{background:var(--red)}
.ws-label{font-size:.65rem;color:var(--subtle);font-weight:500}
.count-chip{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber);display:none}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--interactive-bg);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color 150ms,background 150ms;flex-shrink:0}
.icon-btn:hover{background:var(--interactive-hover);color:var(--text)}
.icon-btn svg{width:14px;height:14px}
.view-tabs{display:flex;gap:1px;background:var(--interactive-bg);border-radius:8px;padding:2px;border:1px solid var(--border)}
.view-tab{font-size:.67rem;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer;color:var(--subtle);background:transparent;border:none;transition:all 150ms;white-space:nowrap}
.view-tab.active{background:var(--amber);color:#09090B}
.view-tab:hover:not(.active){color:var(--muted);background:var(--interactive-hover)}
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── Animations ── */
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes primaryIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes completeExit{0%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(.88) translateY(-24px);opacity:0}}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}60%{box-shadow:0 0 0 4px rgba(239,68,68,0)}}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── Station view ── */
#stationView{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── Order card ── */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;will-change:transform,opacity;transition:border-color 200ms var(--ease-out-quint),transform 150ms var(--ease-out-quint)}
.order-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.order-card.card-in{animation:cardIn .3s var(--ease-out-quint) both}
.order-card.hero-in{animation:heroIn .38s var(--ease-out-quint) both}
.order-card.complete-exit{animation:completeExit .32s var(--ease-in-quint) both;pointer-events:none}
.order-card.urgent{animation:urgentPulse 1.5s infinite;border-color:rgba(239,68,68,.45)!important}
.card-band{padding:12px 14px 10px;position:relative;border-bottom:1px solid var(--divider)}
.band-efectivo{background:linear-gradient(135deg,rgba(34,197,94,.16),rgba(16,185,129,.06))}
.band-transferencia{background:linear-gradient(135deg,rgba(59,130,246,.16),rgba(99,102,241,.06))}
.card-invoice{font-size:.6rem;font-weight:700;letter-spacing:.08em;color:var(--subtle);font-family:monospace}
.card-client{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-top:2px;line-height:1.2}
.card-total{position:absolute;top:12px;right:12px;font-size:.82rem;font-weight:800;color:var(--text)}
.card-method-badge{display:inline-flex;align-items:center;gap:4px;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:4px}
.timer-track{height:3px;background:var(--divider)}
.timer-fill{height:100%;transition:width .5s ease-out,background .5s ease-out}
.items-list{padding:10px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-qty{font-size:.63rem;font-weight:800;padding:1.5px 6px;border-radius:5px;flex-shrink:0;margin-top:2px}
.item-name{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.3}
.item-base{font-size:.68rem;font-weight:600;color:var(--amber);display:flex;align-items:center;gap:3px;margin-top:3px;line-height:1.2}
.item-base-arrow{opacity:.7;font-style:normal}
.item-obs{font-size:.65rem;font-weight:600;color:var(--muted);display:block;margin-top:2px;letter-spacing:.01em;opacity:.8}
.btn-ready{margin:0 10px 10px;padding:10px 0;border-radius:12px;border:1px solid var(--green-border);background:var(--green-dim);color:var(--green-text);font-size:.78rem;font-weight:800;letter-spacing:.02em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 150ms,border-color 150ms;position:relative;overflow:hidden}
.btn-ready:hover{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.45)}
.btn-ready:active{transform:scale(.97)}
.btn-ready svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
/* Station view: columns on top, shared queue at bottom */
#stationView{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#stationColumns{display:flex;flex:1;min-height:0;overflow:hidden}
.station-panel{display:flex;flex-direction:column;min-height:0;overflow:hidden;border-right:1px solid var(--border)}
.station-panel:last-child{border-right:none}
.station-header{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface-raised);gap:8px}
.station-name-input{font-size:.78rem;font-weight:700;color:var(--text);background:transparent;border:none;outline:none;min-width:0;flex:1}
.station-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--subtle)}
.station-status-dot.busy{background:var(--amber);box-shadow:0 0 6px var(--amber-glow)}
.station-status-dot.free{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
.station-body{flex:1;overflow-y:auto;padding:8px}
/* Primary card — fills the column, large */
.primary-card{border-radius:16px;border-width:1.5px;animation:primaryIn .32s var(--ease-out-quint) both;width:100%}
.primary-card .card-band{padding:12px 14px 10px}
.primary-card .card-client{font-size:1.35rem;font-weight:900;letter-spacing:-.03em}
.primary-card .card-total{top:12px;right:12px;font-size:.88rem}
.primary-card .items-list{padding:10px 14px;gap:7px}
.primary-card .item-name{font-size:.85rem}
.primary-card .btn-ready{margin:0 12px 12px;padding:13px 0;font-size:.8rem;border-radius:13px}
.station-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--subtle);font-size:.78rem;font-weight:500;padding:20px}
.station-empty-icon{width:40px;height:40px;border-radius:12px;background:var(--interactive-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
/* Shared queue at the bottom */
#sharedQueue{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface-raised)}
.shared-queue-hdr{display:flex;align-items:center;gap:8px;padding:7px 14px 5px}
.shared-queue-label{font-size:.6rem;font-weight:800;letter-spacing:.1em;color:var(--subtle)}
.shared-queue-chip{font-size:.6rem;font-weight:800;padding:1px 7px;border-radius:99px;background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber)}
.shared-queue-list{display:flex;gap:7px;padding:0 12px 8px;overflow-x:auto;scrollbar-width:none}
.shared-queue-list::-webkit-scrollbar{display:none}
/* Queue pill card (horizontal) */
.q-pill{display:flex;align-items:center;gap:7px;padding:6px 10px 6px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card);flex-shrink:0;min-width:160px;max-width:220px;cursor:default}
.q-pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.q-pill-client{font-size:.73rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;flex-shrink:0}
.q-pill-items{font-size:.63rem;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-pill-total{font-size:.68rem;font-weight:700;color:var(--subtle);flex-shrink:0;white-space:nowrap}
/* Global empty */
#emptyState{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px}
#emptyState.show{display:flex}
.empty-icon{width:64px;height:64px;border-radius:18px;background:var(--amber-dim);border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:28px;height:28px;fill:var(--amber);opacity:.7}
/* History */
.history-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity 220ms var(--ease-out-quint)}
.history-overlay.open{opacity:1;pointer-events:auto}
.history-panel{position:fixed;top:0;right:-440px;bottom:0;width:420px;max-width:92vw;z-index:61;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:right 260ms var(--ease-out-quint)}
.history-panel.open{right:0}
.history-panel-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.history-list{flex:1;overflow-y:auto;padding:10px}
.history-card{border-radius:12px;border:1px solid var(--border);background:var(--surface-card);margin-bottom:8px;overflow:hidden;transition:border-color 150ms}
.history-card:hover{border-color:var(--border2)}
/* Config sheet */
.cfg-overlay{position:fixed;inset:0;z-index:70;background:var(--overlay);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.cfg-overlay.open{display:flex}
.cfg-sheet{width:100%;max-width:600px;border-radius:20px 20px 0 0;background:var(--card);border-top:1px solid var(--border);padding:20px;max-height:85vh;overflow-y:auto;animation:sheetIn .3s var(--ease-out-quint)}

@media(prefers-reduced-motion:reduce){*{transition:opacity 150ms linear!important;transform:none!important;animation:none!important}}
</style>
<script src="https://cdn.tailwindcss.com"></script>

<div class="history-panel" id="historyPanel">

      <div style="font-size:.95rem;font-weight:700;color:var(--text)">Historial de Pedidos</div>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>

<!-- STATION CONFIG -->

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:1rem;font-weight:700;color:var(--text)">Configurar Preparadores</div>
      <button class="icon-btn" onclick="closeCfg()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>

        <button onclick="setCfgCount(1)" data-n="1" class="cfg-n px-5 py-2 rounded-xl text-sm font-bold border cursor-pointer" style="background:var(--amber-dim);border-color:var(--amber-border);color:var(--amber)">1</button>
        <button onclick="setCfgCount(2)" data-n="2" class="cfg-n px-5 py-2 rounded-xl text-sm font-bold border cursor-pointer" style="background:var(--interactive-bg);border-color:var(--border);color:var(--muted)">2</button>
        <button onclick="setCfgCount(3)" data-n="3" class="cfg-n px-5 py-2 rounded-xl text-sm font-bold border cursor-pointer" style="background:var(--interactive-bg);border-color:var(--border);color:var(--muted)">3</button>
        <button onclick="setCfgCount(4)" data-n="4" class="cfg-n px-5 py-2 rounded-xl text-sm font-bold border cursor-pointer" style="background:var(--interactive-bg);border-color:var(--border);color:var(--muted)">4</button>
      </div>
    </div>
    <div id="cfgStationsWrap" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
    <button onclick="applyCfg()" style="width:100%;padding:12px;border-radius:12px;font-size:.88rem;font-weight:800;cursor:pointer;background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber)">
      Aplicar
    </button>
  </div>
</div>


<script>
var ws=null,wsTimer=null;
var orders={};
var stationCfg={count:1,stations:[{name:'Preparador 1',catIds:[]}]};
// stationActive: {idx: [orderId, orderId]} — up to 2 active orders per station
var stationActive={};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return '$'+Math.round(n).toLocaleString('es-CO')}

function _timer(fecha){
  var min=(Date.now()-new Date(fecha).getTime())/60000;
  if(min<3) return {color:'#4ade80',pct:Math.min(min/3*100,100),urgent:false};
  if(min<5) return {color:'#facc15',pct:100,urgent:false};
  return {color:'#f87171',pct:100,urgent:true};
}
function _timerBar(fecha){
  var i=_timer(fecha);
  return '<div class="timer-track"><div class="timer-fill" style="width:'+i.pct+'%;background:'+i.color+'"></div></div>';
}
function _band(m){return (m||'').toLowerCase().includes('transf')?'band-transferencia':'band-efectivo'}
function _badge(m){
  var t=(m||'').toLowerCase().includes('transf');
  var c=t?'rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:var(--blue-text)':'rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35);color:var(--green-text)';
  return '<span class="card-method-badge" style="background:'+c+'">'+m+'</span>';
}
function _parseObs(obs){
  if(!obs) return {base:'',notes:''};
  var parts=obs.split(' | ');
  if(parts[0].includes(':')){return {base:parts[0],notes:parts.slice(1).join(' | ')};}
  return {base:'',notes:obs};
}
function _items(items){
  if(!items||!items.length) return '<div style="color:var(--subtle);font-size:.75rem">Sin items</div>';
  return items.map(function(it){
    var c=it.categoria_color||'#f59e0b';
    var p=_parseObs(it.observaciones);
    var baseHtml=p.base?'<span class="item-base"><em class="item-base-arrow">↳</em>'+esc(p.base)+'</span>':'';
    var obsHtml=p.notes?'<span class="item-obs">'+esc(p.notes)+'</span>':'';
    return '<div class="item-row"><span class="item-qty" style="background:'+c+'20;border:1px solid '+c+'40;color:'+c+'">'+it.cantidad+'x</span><div><span class="item-name">'+esc(it.nombre)+'</span>'+baseHtml+obsHtml+'</div></div>';
  }).join('');
}

function _primaryCard(o,stIdx){
  var info=_timer(o.fecha);
  var d=document.createElement('div');
  d.id='order-'+o.id;
  d.className='order-card primary-card'+(info.urgent?' urgent':'');
  d.innerHTML='<div class="card-band '+_band(o.metodo_pago)+'">'
    +'<div class="card-invoice">'+esc(o.numero_factura||'#'+o.id)+'</div>'
    +'<div class="card-client">'+esc(o.cliente)+'</div>'
    +_badge(o.metodo_pago)
    +'<div class="card-total">'+fmt(o.total)+'</div>'
    +'</div>'
    +_timerBar(o.fecha)
    +'<div class="items-list" data-fecha="'+o.fecha+'">'+_items(o.items)+'</div>'
    +'<button class="btn-ready" onclick="markReady('+o.id+','+stIdx+',this)">'
    +'<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
    +'MARCAR PREPARADO</button>';
  return d;
}

function _queuePill(o){
  var info=_timer(o.fecha);
  var its=(o.items||[]).map(function(it){return it.cantidad+'x '+esc(it.nombre)}).join(' · ');
  var d=document.createElement('div');
  d.className='q-pill';
  d.innerHTML='<div class="q-pill-dot" style="background:'+info.color+'"></div>'
    +'<div class="q-pill-client">'+esc(o.cliente)+'</div>'
    +'<div class="q-pill-items">'+its+'</div>'
    +'<div class="q-pill-total">'+fmt(o.total)+'</div>';
  return d;
}

function _allAssigned(){
  var set=new Set();
  Object.values(stationActive).forEach(function(id){if(id!=null) set.add(id);});
  return set;
}

function renderStation(){
  var allOrders=Object.values(orders);
  var count=stationCfg.count||1;
  var em=document.getElementById('emptyState');
  var cols=document.getElementById('stationColumns');
  var sharedQ=document.getElementById('sharedQueue');

  // Remove stale active IDs
  Object.keys(stationActive).forEach(function(k){
    if(!orders[stationActive[k]]) delete stationActive[k];
  });

  // Auto-assign one order per empty station
  var assigned=_allAssigned();
  for(var i=0;i<count;i++){
    if(stationActive[i]==null){
      var next=allOrders.find(function(o){return !assigned.has(o.id);});
      if(next){stationActive[i]=next.id; assigned.add(next.id);}
    }
  }

  // Queue = all unassigned orders
  assigned=_allAssigned();
  var queueOrders=allOrders.filter(function(o){return !assigned.has(o.id);});

  // Global empty state
  if(!allOrders.length){
    em.classList.add('show');
    cols.innerHTML=''; cols.style.display='none';
    sharedQ.style.display='none';
    return;
  }
  em.classList.remove('show');
  cols.style.display='flex';

  // Rebuild columns
  cols.innerHTML='';
  for(var i=0;i<count;i++){
    (function(idx){
      var cfg=stationCfg.stations[idx]||{name:'Preparador '+(idx+1)};
      var activeId=stationActive[idx]??null;
      var activeO=activeId!=null?orders[activeId]:null;

      var panel=document.createElement('div');
      panel.className='station-panel'; panel.style.flex='1'; panel.id='sp-'+idx;

      // Header
      var hdr=document.createElement('div');
      hdr.className='station-header';
      var dotClass=activeO?'busy':'free';
      hdr.innerHTML='<div class="station-status-dot '+dotClass+'"></div>'
        +'<input class="station-name-input" value="'+esc(cfg.name)+'" data-idx="'+idx
        +'" onchange="stationCfg.stations['+idx+'].name=this.value;saveStationCfg()">';
      panel.appendChild(hdr);

      // Body
      var body=document.createElement('div');
      body.className='station-body';
      if(activeO){
        body.appendChild(_primaryCard(activeO,idx));
      } else {
        var emp=document.createElement('div');
        emp.className='station-empty';
        emp.innerHTML='<div class="station-empty-icon">✓</div><span>Libre — esperando pedido</span>';
        body.appendChild(emp);
      }
      panel.appendChild(body);
      cols.appendChild(panel);
    })(i);
  }

  // Shared queue at bottom
  if(queueOrders.length>0){
    sharedQ.style.display='block';
    document.getElementById('queueChip').textContent=queueOrders.length;
    var list=document.getElementById('queueList');
    list.innerHTML='';
    queueOrders.forEach(function(o){list.appendChild(_queuePill(o));});
  } else {
    sharedQ.style.display='none';
  }
}

function renderView(){ renderStation(); updateChip(); }

function updateChip(){
  var c=Object.keys(orders).length, chip=document.getElementById('countChip');
  chip.textContent=c+(c===1?' pedido':' pedidos'); chip.style.display=c>0?'inline-flex':'none';
}

function connectWS(){
  if(wsTimer){clearTimeout(wsTimer);wsTimer=null;}
  try{
    var proto=location.protocol==='https:'?'wss':'ws';
    ws=new WebSocket(proto+'://'+location.host+'/api/ws');
    ws.onopen=function(){setDot('on')};
    ws.onclose=function(){setDot('err');wsTimer=setTimeout(connectWS,3000)};
    ws.onerror=function(){setDot('err')};
    ws.onmessage=function(e){
      var msg=JSON.parse(e.data);
      if(msg.type==='new_order'){ orders[msg.order.id]=msg.order; renderView(); }
      else if(msg.type==='config_sync'){ loadPendientes(); }
    };
  }catch(e){setDot('err');wsTimer=setTimeout(connectWS,3000);}
}
function setDot(s){
  document.getElementById('wsDot').className='ws-dot '+(s==='on'?'on':'err');
  document.getElementById('wsLabel').textContent=s==='on'?'En vivo':'Reconectando';
}

async function markReady(id,stIdx,btn){
  if(btn){btn.disabled=true;btn.textContent='Marcando...';}
  var sName=stationCfg.stations[stIdx]?stationCfg.stations[stIdx].name:('Preparador '+(stIdx+1));
  try{
    await fetch('/api/pedidos/'+id+'/preparar',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({preparador:sName})});
  }catch(e){}
  var card=document.getElementById('order-'+id);
  if(card) card.classList.add('complete-exit');
  setTimeout(function(){
    delete orders[id];
    if(stationActive[stIdx]===id) delete stationActive[stIdx];
    renderView();
  },340);
}

async function loadPendientes(){
  try{
    var list=await fetch('/api/pedidos/pendientes').then(function(r){return r.json()});
    orders={};
    list.forEach(function(o){orders[o.id]=o;});
    renderView();
  }catch(e){}
}

async function openHistory(){
  document.getElementById('historyOverlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
  document.getElementById('historyList').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--subtle);font-size:.82rem">Cargando...</div>';
  try{
    var list=await fetch('/api/pedidos/entregados').then(function(r){return r.json()});
    renderHistory(list);
  }catch(e){
    document.getElementById('historyList').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--subtle)">Error al cargar</div>';
  }
}
function renderHistory(list){
  var el=document.getElementById('historyList');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--subtle);font-size:.82rem">Sin pedidos entregados aún</div>';
    return;
  }
  el.innerHTML=list.map(function(o){
    var d=new Date(o.fecha);
    var hora=d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    var fecha=d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
    var its=(o.items||[]).map(function(it){return it.cantidad+'x '+esc(it.nombre)}).join(', ');
    var prep=o.preparador?'<span style="color:var(--amber);font-size:.65rem;font-weight:600">Por: '+esc(o.preparador)+'</span>':'';
    return '<div class="history-card">'
      +'<div style="padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--divider)">'
      +'<div><div style="font-size:.78rem;font-weight:700;color:var(--text)">'+esc(o.cliente)+'</div>'
      +'<div style="font-size:.62rem;color:var(--subtle);margin-top:1px;font-family:monospace">'+esc(o.numero_factura||'#'+o.id)+' · '+fecha+' '+hora+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:.82rem;font-weight:800;color:var(--text)">'+fmt(o.total)+'</div>'+prep+'</div>'
      +'</div>'
      +'<div style="padding:8px 14px;font-size:.75rem;color:var(--muted);line-height:1.6">'+its+'</div>'
      +'</div>';
  }).join('');
}
function closeHistory(){
  document.getElementById('historyOverlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

function updateTimers(){
  document.querySelectorAll('[data-fecha]').forEach(function(el){
    var i=_timer(el.dataset.fecha);
    var fill=el.querySelector('.timer-fill');
    if(fill){fill.style.width=i.pct+'%';fill.style.background=i.color;}
    var card=el.closest('.order-card');
    if(card) i.urgent?card.classList.add('urgent'):card.classList.remove('urgent');
  });
}
setInterval(updateTimers,30000);

function openCfg(){renderCfgUI();document.getElementById('cfgOverlay').classList.add('open');}
function closeCfg(){document.getElementById('cfgOverlay').classList.remove('open');}
function renderCfgUI(){
  var n=stationCfg.count;
  document.querySelectorAll('.cfg-n').forEach(function(b){
    var on=+b.dataset.n===n;
    b.style.background=on?'var(--amber-dim)':'var(--interactive-bg)';
    b.style.borderColor=on?'var(--amber-border)':'var(--border)';
    b.style.color=on?'var(--amber)':'var(--muted)';
  });
  var el=document.getElementById('cfgStationsWrap');
  el.innerHTML=Array.from({length:n},function(_,i){
    var cfg=stationCfg.stations[i]||{name:'Estación '+(i+1),catIds:[]};
    return '<div style="padding:12px;border-radius:12px;background:var(--surface-card);border:1px solid var(--border)">'
      +'<div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--subtle);margin-bottom:6px">PREPARADOR '+(i+1)+'</div>'
      +'<input style="font-size:.85rem;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--interactive-bg);width:100%;color:var(--text);outline:none" value="'+esc(cfg.name)+'" data-station="'+i+'" placeholder="Nombre del preparador">'
      +'</div>';
  }).join('');
}
function setCfgCount(n){
  stationCfg.count=n;
  while(stationCfg.stations.length<n) stationCfg.stations.push({name:'Estación '+(stationCfg.stations.length+1),catIds:[]});
  renderCfgUI();
}
function applyCfg(){
  document.querySelectorAll('[data-station]').forEach(function(inp){
    var i=+inp.dataset.station;
    if(!stationCfg.stations[i]) stationCfg.stations[i]={name:'',catIds:[]};
    stationCfg.stations[i].name=inp.value.trim()||'Estación '+(i+1);
  });
  saveStationCfg(); closeCfg(); renderView();
}
function saveStationCfg(){saveSetting('cocina_stations',JSON.stringify(stationCfg));}

function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(t==='light'?'dark':'light');
}
function applyTheme(t){
  t=(t==='light')?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  saveSetting('drunksPalette',t); saveSetting('palette',t);
  var btn=document.getElementById('themeToggleBtn');
  if(btn) btn.innerHTML=t==='dark'
    ?'<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/></svg>';
}

function saveSetting(key,value){
  localStorage.setItem(key,value);
  fetch('/api/settings/'+key,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value})}).catch(function(){});
}
async function loadSettings(){
  try{
    var s=await fetch('/api/settings').then(function(r){return r.json()});
    var pal=s.palette||localStorage.getItem('drunksPalette')||'dark';
    if(!['dark','light'].includes(pal)) pal='dark';
    applyTheme(pal);
    if(s.cocina_stations){try{stationCfg=JSON.parse(s.cocina_stations);}catch(e){}}
  }catch(e){applyTheme(localStorage.getItem('drunksPalette')||'dark');}
}

async function init(){
  await loadSettings();
  await loadPendientes();
  connectWS();
}
window.addEventListener('viewMounted',function(){
  loadPendientes();
  if(!ws||ws.readyState>1) connectWS();
});
init();
</script>
</body>
</html>
