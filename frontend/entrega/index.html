<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Drunks · Entrega</title>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('drunksPalette')||'dark')</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090B;--surface:#111113;--card:#18181B;--border:#27272A;
  --text:#FAFAFA;--muted:#A1A1AA;--subtle:#52525B;
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,.12);--amber-border:rgba(245,158,11,.28);
  --green:#22C55E;--green-dim:rgba(34,197,94,.10);--green-border:rgba(34,197,94,.28);
  --orange:#F97316;--orange-dim:rgba(249,115,22,.10);--orange-border:rgba(249,115,22,.28);
  --red:#EF4444;
  --ease-out-quint:cubic-bezier(.23,1,.32,1);
  --ease-in-quint:cubic-bezier(.64,0,.78,0);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{display:none}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(9,9,11,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;
}
.logo-mark{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--amber),#D97706);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(245,158,11,.2)}
.logo-mark svg{width:14px;height:14px;fill:#09090B}
.count-chip{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber);display:none}
.ws-pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--subtle);flex-shrink:0;transition:background 300ms,box-shadow 300ms}
.ws-dot.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.6)}
.ws-dot.err{background:var(--red)}
.ws-label{font-size:.65rem;color:var(--subtle);font-weight:500}

/* ── Legend ── */
.legend{
  display:flex;align-items:center;gap:12px;padding:8px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);
  background:rgba(255,255,255,.02);
  font-size:.68rem;font-weight:600;color:var(--muted);
}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Scroll ── */
.scroll-area{padding:16px;min-height:calc(100vh - 90px)}

/* ── Grid ── */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;align-items:start;
}

/* ── Animations ── */
@keyframes cardArrive{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes cardLeave{0%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(.86) translateY(-18px);opacity:0}}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── ORDER CARD ── */
.order-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  will-change:transform,opacity;
  transition:border-color 200ms var(--ease-out-quint),transform 150ms var(--ease-out-quint),box-shadow 200ms;
}
.order-card.card-in{animation:cardArrive .32s var(--spring) both}
.order-card.exit{animation:cardLeave .24s var(--ease-in-quint) both;pointer-events:none}
.order-card.urgent{animation:urgentPulse 1.6s ease-in-out infinite}

/* READY state (prepared) */
.order-card.state-ready{
  border-color:var(--green-border);
  box-shadow:0 0 0 1px rgba(34,197,94,.08) inset;
}
.order-card.state-ready:hover{
  border-color:rgba(34,197,94,.5);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(34,197,94,.1);
}

/* PENDING state (not yet prepared) */
.order-card.state-pending{
  border-color:var(--orange-border);
  box-shadow:0 0 0 1px rgba(249,115,22,.06) inset;
  opacity:.82;
}
.order-card.state-pending:hover{
  border-color:rgba(249,115,22,.45);
  opacity:1;
  transform:translateY(-1px);
}

/* ── Card header band ── */
.card-band{padding:12px 14px 10px;position:relative;border-bottom:1px solid rgba(255,255,255,.06)}
.band-ready{background:linear-gradient(135deg,rgba(34,197,94,.14),rgba(16,185,129,.05))}
.band-pending{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(234,88,12,.04))}
.card-status{
  position:absolute;top:12px;right:12px;
  font-size:.6rem;font-weight:800;padding:2.5px 8px;border-radius:99px;letter-spacing:.05em;
}
.status-ready{background:var(--green-dim);border:1px solid var(--green-border);color:#86efac}
.status-pending{background:var(--orange-dim);border:1px solid var(--orange-border);color:#fdba74}
.card-invoice{font-size:.6rem;font-weight:700;letter-spacing:.08em;color:var(--subtle);font-family:monospace}
.card-client{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-top:2px;line-height:1.2}
.card-method{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:4px}

/* ── Timer bar ── */
.timer-track{height:3px;background:rgba(255,255,255,.06)}
.timer-fill{height:100%;transition:width .5s ease-out,background .5s ease-out}

/* ── Items ── */
.items-list{padding:10px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-qty{font-size:.63rem;font-weight:800;padding:1.5px 6px;border-radius:5px;flex-shrink:0;margin-top:1px}
.item-name{font-size:.8rem;color:var(--muted);line-height:1.35}
.item-obs{font-size:.7rem;color:var(--subtle);display:block;margin-top:1px}

/* ── Blocked overlay (pending) ── */
.pending-overlay{
  margin:0 12px 12px;padding:11px 0;border-radius:12px;
  border:1px solid var(--orange-border);background:var(--orange-dim);
  color:#fdba74;font-size:.78rem;font-weight:700;letter-spacing:.02em;
  display:flex;align-items:center;justify-content:center;gap:7px;
  pointer-events:none;
}
.pending-overlay svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}

/* ── Deliver button ── */
.btn-deliver{
  margin:0 12px 12px;padding:12px 0;border-radius:12px;
  border:1px solid var(--green-border);background:var(--green-dim);
  color:#86efac;font-size:.82rem;font-weight:800;letter-spacing:.02em;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:background 150ms var(--ease-out-quint),border-color 150ms,transform 100ms ease-out;
  position:relative;overflow:hidden;
}
.btn-deliver:hover{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.55)}
.btn-deliver:active{transform:scale(.97)}
.btn-deliver svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}

/* ── Empty state ── */
#emptyState{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:12px}
#emptyState.show{display:flex}
.empty-icon{width:64px;height:64px;border-radius:18px;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:28px;height:28px;fill:var(--green);opacity:.7}

@media(prefers-reduced-motion:reduce){
  .order-card,.btn-deliver{transition:opacity 150ms linear!important;transform:none!important}
  .order-card.card-in,.order-card.exit,.order-card.urgent{animation:none!important}
}
</style>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9 1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
  </div>
  <div style="line-height:1">
    <div style="font-size:.88rem;font-weight:700;letter-spacing:-.01em">Entrega</div>
  </div>
  <span id="countChip" class="count-chip"></span>
  <div style="flex:1"></div>
  <div class="ws-pill">
    <div id="wsDot" class="ws-dot"></div>
    <span class="ws-label" id="wsLabel">Conectando</span>
  </div>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-dot" style="background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.5)"></div>
  <span>Listo para entregar</span>
  <div class="legend-dot" style="background:var(--orange);box-shadow:0 0 5px rgba(249,115,22,.4);margin-left:8px"></div>
  <span>En preparación</span>
</div>

<!-- Content -->
<div class="scroll-area">
  <div id="grid"></div>
  <div id="emptyState">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <p style="font-size:1rem;font-weight:700;color:var(--text)">Todo entregado</p>
    <p style="font-size:.8rem;color:var(--subtle);text-align:center">Los pedidos listos de cocina<br>aparecerán aquí automáticamente</p>
  </div>
</div>

<script>
var orders = {};
var ws = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return '$' + Math.round(n).toLocaleString('es-CO'); }

/* ── Timer ── */
function _timer(fecha) {
  var min = (Date.now() - new Date(fecha).getTime()) / 60000;
  if (min < 3) return {color:'#4ade80', pct:Math.min(min/3*100,100), urgent:false};
  if (min < 5) return {color:'#facc15', pct:100, urgent:false};
  return          {color:'#f87171', pct:100, urgent:true};
}

function updateTimers() {
  document.querySelectorAll('[data-fecha]').forEach(function(el) {
    var i = _timer(el.dataset.fecha);
    var fill = el.querySelector('.timer-fill');
    if (fill) { fill.style.width = i.pct+'%'; fill.style.background = i.color; }
    var card = el.closest('.order-card');
    if (card && card.classList.contains('state-ready')) {
      i.urgent ? card.classList.add('urgent') : card.classList.remove('urgent');
    }
  });
}
setInterval(updateTimers, 30000);

/* ── Build card ── */
function _buildCard(o, delay) {
  var isReady = o.estado === 'preparado';
  var info = _timer(o.fecha);

  var itemsHTML = (o.items||[]).map(function(it) {
    var c = it.categoria_color || '#f59e0b';
    return '<div class="item-row">'
      + '<span class="item-qty" style="background:'+c+'20;border:1px solid '+c+'40;color:'+c+'">'+it.cantidad+'x</span>'
      + '<div><span class="item-name">'+esc(it.nombre)+'</span>'
      + (it.observaciones ? '<span class="item-obs">'+esc(it.observaciones)+'</span>' : '')
      + '</div></div>';
  }).join('');

  var isTransf = (o.metodo_pago||'').toLowerCase().includes('transf');
  var methodCol = isTransf ? 'rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd' : 'rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35);color:#86efac';

  var div = document.createElement('div');
  div.id = 'order-' + o.id;
  div.className = 'order-card card-in ' + (isReady ? 'state-ready' : 'state-pending') + (info.urgent && isReady ? ' urgent' : '');
  if (delay) div.style.animationDelay = delay + 'ms';

  div.innerHTML =
    '<div class="card-band ' + (isReady ? 'band-ready' : 'band-pending') + '" data-fecha="'+o.fecha+'">'
    + '<div class="card-status ' + (isReady ? 'status-ready' : 'status-pending') + '">' + (isReady ? 'LISTO' : 'PREPARANDO') + '</div>'
    + '<div class="card-invoice">' + esc(o.numero_factura||'#'+o.id) + '</div>'
    + '<div class="card-client">' + esc(o.cliente) + '</div>'
    + '<span class="card-method" style="background:'+methodCol+'">'+esc(o.metodo_pago)+'</span>'
    + '</div>'
    + '<div class="timer-track"><div class="timer-fill" style="width:'+info.pct+'%;background:'+info.color+'"></div></div>'
    + '<div class="items-list">' + itemsHTML + '</div>'
    + (isReady
        ? '<button class="btn-deliver" onclick="deliverOrder('+o.id+')">'
          + '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
          + 'ENTREGAR AL CLIENTE'
          + '</button>'
        : '<div class="pending-overlay">'
          + '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'
          + 'En preparación en cocina'
          + '</div>');

  return div;
}

/* ── Add / Update order ── */
function addOrder(o, delay) {
  if (orders[o.id]) {
    /* Update existing card (estado change) */
    orders[o.id] = o;
    var existing = document.getElementById('order-' + o.id);
    if (existing) {
      var newCard = _buildCard(o, 0);
      existing.replaceWith(newCard);
    }
  } else {
    orders[o.id] = o;
    var grid = document.getElementById('grid');
    /* Insert ready orders before pending */
    var newCard = _buildCard(o, delay||0);
    if (o.estado === 'preparado') {
      var firstPending = grid.querySelector('.state-pending');
      if (firstPending) grid.insertBefore(newCard, firstPending);
      else grid.appendChild(newCard);
    } else {
      grid.appendChild(newCard);
    }
  }
  updateTimers();
  updateUI();
}

function removeOrder(id) {
  delete orders[id];
  var card = document.getElementById('order-' + id);
  if (card) { card.classList.add('exit'); }
  setTimeout(function() {
    var c = document.getElementById('order-' + id);
    if (c) c.remove();
    updateUI();
  }, 250);
}

function updateUI() {
  var readyCount  = Object.values(orders).filter(function(o){ return o.estado==='preparado'; }).length;
  var totalCount  = Object.keys(orders).length;
  var chip = document.getElementById('countChip');
  var empty = document.getElementById('emptyState');

  if (readyCount > 0) {
    chip.textContent = readyCount + (readyCount===1?' listo':' listos');
    chip.style.display = 'inline-flex';
  } else if (totalCount > 0) {
    chip.textContent = totalCount + ' pendiente' + (totalCount===1?'':'s');
    chip.style.display = 'inline-flex';
    chip.style.background = 'var(--orange-dim)';
    chip.style.borderColor = 'var(--orange-border)';
    chip.style.color = '#fdba74';
  } else {
    chip.style.display = 'none';
    chip.style.background = '';
    chip.style.borderColor = '';
    chip.style.color = '';
  }

  if (!totalCount) empty.classList.add('show');
  else empty.classList.remove('show');
}

/* ── WebSocket ── */
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/api/ws');
  ws.onopen = function() { setDot('on'); };
  ws.onclose = function() { setDot('err'); setTimeout(connectWS, 3000); };
  ws.onerror = function() { setDot('err'); };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'new_order') {
      addOrder(msg.order);
    } else if (msg.type === 'order_prepared') {
      /* Update card from pending → ready */
      if (orders[msg.order.id]) {
        orders[msg.order.id].estado = 'preparado';
        var card = document.getElementById('order-' + msg.order.id);
        if (card) {
          var newCard = _buildCard(orders[msg.order.id], 0);
          card.replaceWith(newCard);
          /* Re-sort: move ready card to front */
          var grid = document.getElementById('grid');
          var firstPending = grid.querySelector('.state-pending');
          if (firstPending) grid.insertBefore(newCard, firstPending);
        }
      } else {
        addOrder(msg.order);
      }
      updateUI();
    }
  };
}
function setDot(s) {
  document.getElementById('wsDot').className = 'ws-dot ' + (s==='on'?'on':'err');
  document.getElementById('wsLabel').textContent = s==='on' ? 'En vivo' : 'Reconectando';
}

/* ── Deliver ── */
function deliverOrder(id) {
  var card = document.getElementById('order-' + id);
  if (!card || card.style.pointerEvents === 'none') return;
  card.style.pointerEvents = 'none';
  fetch('/api/pedidos/' + id + '/entregar', { method: 'PUT' })
    .catch(function() {})
    .finally(function() { removeOrder(id); });
}

/* ── Load ── */
function loadActivos() {
  fetch('/api/pedidos/activos').then(function(r){ return r.json(); }).then(function(list) {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    orders = {};
    /* Sort: prepared first, then pending */
    var ready   = list.filter(function(o){ return o.estado==='preparado'; });
    var pending = list.filter(function(o){ return o.estado==='pendiente'; });
    var sorted  = ready.concat(pending);
    sorted.forEach(function(o, idx) {
      orders[o.id] = o;
      grid.appendChild(_buildCard(o, idx * 45));
    });
    updateTimers();
    updateUI();
  }).catch(function() { updateUI(); });
}

loadActivos();
connectWS();

window.addEventListener('viewMounted', function() {
  loadActivos();
  if (!ws || ws.readyState > 1) connectWS();
});
</script>
</body>
</html>
