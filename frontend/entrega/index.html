<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Drunks · Entrega</title>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('drunksPalette')||'dark')</script>
<style>
/* ── Easing tokens (Emil Kowalski) ── */
:root{
  --ease-out-quint:cubic-bezier(.23,1,.32,1);
  --ease-in-quint:cubic-bezier(.64,0,.78,0);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#020617;font-family:'Segoe UI',system-ui,sans-serif;color:#f8fafc;overflow-x:hidden}

/* ── Header glassmorphism ── */
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(2,6,23,.85);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:0 20px;height:52px;
  display:flex;align-items:center;gap:12px;
}
.header-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(34,197,94,.4);
}
.header-icon svg{width:16px;height:16px;fill:#fff}
.header-title{font-size:.95rem;font-weight:800;color:#f8fafc;letter-spacing:-.01em}
.count-badge{
  font-size:.72rem;font-weight:700;
  padding:3px 9px;border-radius:99px;
  background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#86efac;
  display:none;
  transition:transform 200ms var(--spring);
}
.count-badge.pop{animation:badgePop .3s var(--spring) both}
@keyframes badgePop{
  0%{transform:scale(0) rotate(-15deg)}
  60%{transform:scale(1.2) rotate(3deg)}
  100%{transform:scale(1) rotate(0deg)}
}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#374151;flex-shrink:0;
  transition:background 300ms ease-out}
.ws-dot.connected{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6)}
.ws-dot.error{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5)}
.ws-label{font-size:.72rem;color:#475569}

/* ── Scroll area ── */
.scroll-area{padding:20px;min-height:calc(100vh - 52px)}

/* ── Grid ── */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:16px;
  align-items:start;
}

/* ── Ticket card ── */
@keyframes ticketArrive{
  from{transform:translateX(-28px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes ticketLeave{
  0%{transform:scale(1) translateY(0);opacity:1}
  100%{transform:scale(.84) translateY(-20px);opacity:0}
}
@keyframes timerUrgentPulse{
  0%,100%{opacity:1}
  50%{opacity:.55}
}

.order-card{
  background:rgba(15,20,40,.75);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;flex-direction:column;
  will-change:transform,opacity;
  transition:border-color 250ms var(--ease-out-quint),
             transform 200ms var(--ease-out-quint);
}
.order-card:hover{
  border-color:rgba(34,197,94,.22);
  transform:translateY(-2px);
}
.order-card.card-in{animation:ticketArrive .36s var(--spring) both}
.order-card.delivering-exit{
  animation:ticketLeave .26s var(--ease-in-quint) both;
  pointer-events:none;
}
.order-card.timer-urgent{animation:timerUrgentPulse 1.6s ease-in-out infinite}

/* ── Ticket header band ── */
.ticket-band{
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;
}
.ticket-number{
  font-size:.65rem;font-weight:700;letter-spacing:.1em;
  color:#475569;font-family:'Courier New',monospace;
  text-transform:uppercase;
}
.ticket-status{
  position:absolute;top:14px;right:14px;
  font-size:.65rem;font-weight:700;padding:3px 10px;border-radius:99px;
  background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;
}
.ticket-client{
  font-size:1.25rem;font-weight:800;color:#f8fafc;
  margin-top:4px;letter-spacing:-.02em;line-height:1.2;
}

/* ── Timer bar ── */
.timer-bar-track{height:4px;background:rgba(255,255,255,.06);overflow:hidden;border-radius:0}
.timer-fill{height:100%;border-radius:0;transition:width .5s ease-out,background-color .5s ease-out}

/* ── Items ── */
.items-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-qty{
  font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;
  margin-top:1px;
}
.item-name{font-size:.875rem;color:#cbd5e1;line-height:1.4}
.item-obs{font-size:.75rem;color:#475569;display:block;margin-top:1px}

/* ── Deliver button ── */
.btn-deliver{
  margin:0 14px 14px;
  padding:14px 0;
  border-radius:12px;
  border:1px solid rgba(34,197,94,.4);
  background:rgba(34,197,94,.12);
  color:#86efac;
  font-size:.9rem;font-weight:800;letter-spacing:.02em;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
  transition:background 150ms var(--ease-out-quint),
             border-color 150ms var(--ease-out-quint),
             transform 100ms ease-out;
}
.btn-deliver:hover{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.6)}
.btn-deliver:active{transform:scale(.97)}
/* Ripple on press */
.btn-deliver::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:rgba(34,197,94,.25);
  transform:scale(0);opacity:0;
  transition:transform 350ms var(--ease-out-quint),opacity 350ms ease-out;
}
.btn-deliver:active::after{transform:scale(1);opacity:1;transition-duration:0ms,0ms}
.btn-deliver svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}

/* ── Empty state ── */
#emptyState{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:50vh;gap:16px;
}
#emptyState.visible{display:flex}
@keyframes emptyPop{
  0%{transform:scale(0) translateY(10px);opacity:0}
  60%{transform:scale(1.1) translateY(-4px);opacity:1}
  100%{transform:scale(1) translateY(0);opacity:1}
}
.empty-icon{
  width:72px;height:72px;border-radius:20px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
  display:flex;align-items:center;justify-content:center;
  animation:emptyPop .45s var(--spring) both;
}
.empty-icon svg{width:36px;height:36px;fill:#22c55e;opacity:.7}
.empty-title{font-size:1.1rem;font-weight:700;color:#f8fafc}
.empty-sub{font-size:.82rem;color:#475569;text-align:center}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  .order-card,.btn-deliver{transition:opacity 150ms linear!important;transform:none!important}
  .order-card.card-in,.order-card.delivering-exit,.count-badge.pop,#emptyState .empty-icon{animation:none!important}
}
</style>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9 1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
  </div>
  <span class="header-title">Entrega</span>
  <span id="countBadge" class="count-badge"></span>
  <div style="flex:1"></div>
  <div id="wsIndicator" class="ws-dot" title="Conexión en tiempo real"></div>
  <span class="ws-label">En tiempo real</span>
</header>

<!-- Content -->
<div class="scroll-area">
  <div id="grid"></div>

  <!-- Empty state -->
  <div id="emptyState">
    <div class="empty-icon">
      <!-- Check circle SVG -->
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <p class="empty-title">Todo entregado</p>
    <p class="empty-sub">Los pedidos listos de cocina<br>aparecerán aquí automáticamente</p>
  </div>
</div>

<script>
var orders = {};
var ws = null;

/* ── Timers ── */
function _getTimerInfo(fecha) {
  var mins = (Date.now() - new Date(fecha).getTime()) / 60000;
  if (mins < 3)  return { color: '#4ade80', glow: 'rgba(74,222,128,.5)',  pct: Math.min(mins/3*33,33) };
  if (mins < 5)  return { color: '#facc15', glow: 'rgba(250,204,21,.5)',  pct: 33 + (mins-3)/2*33 };
  return             { color: '#f87171', glow: 'rgba(248,113,113,.6)', pct: 66 + Math.min((mins-5)/5*34,34), urgent: true };
}
function updateTimers() {
  document.querySelectorAll('[data-fecha]').forEach(function(el) {
    var info = _getTimerInfo(el.dataset.fecha);
    var fill = el.querySelector('.timer-fill');
    if (fill) { fill.style.background = info.color; fill.style.width = info.pct + '%'; fill.style.boxShadow = '0 0 6px ' + info.glow; }
    var card = el.closest('.order-card');
    if (card) {
      if (info.urgent) card.classList.add('timer-urgent');
      else card.classList.remove('timer-urgent');
    }
  });
}
setInterval(updateTimers, 30000);

/* ── WebSocket ── */
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/api/ws');
  ws.onopen = function() {
    var dot = document.getElementById('wsIndicator');
    dot.classList.add('connected');
    dot.classList.remove('error');
  };
  ws.onclose = function() {
    var dot = document.getElementById('wsIndicator');
    dot.classList.remove('connected');
    dot.classList.add('error');
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'order_prepared') addOrder(msg.order);
  };
}

/* ── Render ── */
function _timerBarHTML(fecha) {
  var info = _getTimerInfo(fecha);
  return '<div class="timer-bar-track"><div class="timer-fill" style="width:' + info.pct + '%;background:' + info.color + ';box-shadow:0 0 6px ' + info.glow + '"></div></div>';
}

function _buildCard(o, delay) {
  var itemsHTML = o.items.map(function(it) {
    var color = it.categoria_color || '#8b5cf6';
    return '<div class="item-row">' +
      '<span class="item-qty" style="background:' + color + '20;border:1px solid ' + color + '40;color:' + color + '">' + it.cantidad + 'x</span>' +
      '<div>' +
        '<span class="item-name">' + it.nombre + '</span>' +
        (it.observaciones ? '<span class="item-obs">' + it.observaciones + '</span>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  var info = _getTimerInfo(o.fecha);
  var div = document.createElement('div');
  div.id = 'order-' + o.id;
  div.className = 'order-card card-in' + (info.urgent ? ' timer-urgent' : '');
  if (delay) div.style.animationDelay = delay + 'ms';
  div.innerHTML =
    '<div class="ticket-band" data-fecha="' + o.fecha + '">' +
      '<span class="ticket-number">' + (o.numero_factura || '#' + o.id) + '</span>' +
      '<span class="ticket-status">Listo</span>' +
      '<div class="ticket-client">' + o.cliente + '</div>' +
    '</div>' +
    _timerBarHTML(o.fecha) +
    '<div class="items-list">' + itemsHTML + '</div>' +
    '<button class="btn-deliver" onclick="deliverOrder(' + o.id + ')">' +
      '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>' +
      'ENTREGAR AL CLIENTE' +
    '</button>';
  return div;
}

function addOrder(o) {
  if (orders[o.id]) return;
  orders[o.id] = o;
  var grid = document.getElementById('grid');
  grid.appendChild(_buildCard(o, 0));
  updateTimers();
  updateUI();
}

function removeOrder(id) {
  delete orders[id];
  var card = document.getElementById('order-' + id);
  if (card) card.classList.add('delivering-exit');
  setTimeout(function() {
    var c = document.getElementById('order-' + id);
    if (c) c.remove();
    updateUI();
  }, 280);
}

function updateUI() {
  var count = Object.keys(orders).length;
  var badge = document.getElementById('countBadge');
  var empty = document.getElementById('emptyState');
  badge.textContent = count;
  if (count > 0) {
    badge.style.display = 'inline-flex';
    badge.classList.add('pop');
    setTimeout(function(){ badge.classList.remove('pop'); }, 300);
    empty.classList.remove('visible');
  } else {
    badge.style.display = 'none';
    empty.classList.add('visible');
  }
}

/* ── Acción entregar ── */
function deliverOrder(id) {
  var card = document.getElementById('order-' + id);
  if (!card || card.style.pointerEvents === 'none') return;
  card.style.pointerEvents = 'none';
  fetch('/api/pedidos/' + id + '/entregar', { method: 'PUT' })
    .catch(function() {})
    .finally(function() { removeOrder(id); });
}

/* ── Carga inicial ── */
function loadListos() {
  fetch('/api/pedidos/listos').then(function(r) { return r.json(); }).then(function(list) {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    orders = {};
    list.forEach(function(o, idx) {
      orders[o.id] = o;
      grid.appendChild(_buildCard(o, idx * 50));
    });
    updateTimers();
    updateUI();
  }).catch(function() { updateUI(); });
}

/* ── Init ── */
loadListos();
connectWS();

window.addEventListener('viewMounted', function() {
  loadListos();
  if (!ws || ws.readyState > 1) connectWS();
});
</script>
</body>
</html>
